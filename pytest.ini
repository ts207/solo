[pytest]
addopts = -q
pythonpath = .
testpaths =
    project/tests
filterwarnings =
    ignore:.*joblib will operate in serial mode.*:UserWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    contract: end-to-end artifact contract tests for CI/CD validation
    audit: audit-oriented checks that inspect pipeline hygiene and repository state
    integration: requires live data and full pipeline execution (deselect with '-m "not integration"')
