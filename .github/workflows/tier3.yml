name: tier3-correctness-gate

on:
  schedule:
    - cron: '0 2 * * *' # 2 AM UTC nightly
  push:
    branches: [ release/* ]
  workflow_dispatch:

jobs:
  tier3:
    name: Tier 3 - Broad Correctness Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: 1. Full Pytest Suite
        run: pytest -q

      - name: 2. Replay and Regression Suites
        run: pytest -q project/tests/replays project/tests/regressions

      - name: 3. Large Integration Flows
        run: |
          # Example of a larger integration flow if distinct from smoke
          pytest -q project/tests/pipelines

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tier3-artifacts
          path: |
            data/
            reports/
