name: Autonomous Research Planner

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:
    inputs:
      program_id:
        description: Campaign program identifier
        required: false
        default: btc_campaign
      symbols:
        description: Comma-separated symbols
        required: false
        default: BTCUSDT
      plan_only:
        description: Plan only (don't execute)
        required: false
        default: "false"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  plan-and-execute:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run autonomous research cycle
        env:
          PROGRAM_ID: ${{ github.event.inputs.program_id || vars.RESEARCH_PROGRAM_ID || 'btc_campaign' }}
          REGISTRY_ROOT: project/configs/registries
          DATA_ROOT: ${{ vars.BACKTEST_DATA_ROOT }}
          SYMBOLS: ${{ github.event.inputs.symbols || vars.RESEARCH_SYMBOLS || 'BTCUSDT' }}
        run: |
          DATA_ARG=()
          if [[ -n "${DATA_ROOT:-}" ]]; then
            DATA_ARG+=(--data_root "${DATA_ROOT}")
          fi
          
          PLAN_ONLY_FLAG=""
          if [[ "${{ github.event.inputs.plan_only }}" == "true" ]]; then
            PLAN_ONLY_FLAG="--plan_only 1"
          fi
          
          python -m project.research.agent_io.closed_loop \
            --program_id "${PROGRAM_ID}" \
            --registry_root "${REGISTRY_ROOT}" \
            "${DATA_ARG[@]}" \
            --symbols "${SYMBOLS}" \
            --lookback_days 90 \
            --max_proposals 10 \
            ${PLAN_ONLY_FLAG:-}

      - name: Record cycle result
        if: always()
        run: |
          echo "Cycle completed. Check artifacts for results."
          echo "Run artifacts are stored in: ${{ vars.BACKTEST_DATA_ROOT }}/artifacts/experiments/${{ github.event.inputs.program_id || 'btc_campaign' }}/memory/"
