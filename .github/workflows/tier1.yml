name: tier1-structural-gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tier1:
    name: Tier 1 - Structural Fast Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest pyright

      - name: 1. Compile Check
        run: python -m compileall -q project project/tests

      - name: 2. Architecture Tests
        run: pytest project/tests/architecture

      - name: 3. Spec Validation
        run: python -m project.spec_validation.cli

      - name: 4. Artifact Drift Checks
        run: |
          echo "Checking Ontology Consistency Drift..."
          python -m project.scripts.ontology_consistency_audit \
            --output docs/generated/ontology_audit.json --check
          
          echo "Checking Detector Coverage Drift..."
          python -m project.scripts.detector_coverage_audit \
            --md-out docs/generated/detector_coverage.md \
            --json-out docs/generated/detector_coverage.json --check
          
          echo "Checking System Map Drift..."
          python -m project.scripts.build_system_map --check

      - name: 5. Selected Fast Regression Tests
        run: |
          pytest -q \
            project/tests/contracts/test_strategy_trace_schema.py \
            project/tests/contracts/test_portfolio_ledger_schema.py \
            project/tests/contracts/test_candidate_artifact_schema.py \
            project/tests/contracts/test_promotion_artifacts_schema.py \
            project/tests/contracts/test_manifest_integrity.py \
            project/tests/contracts/test_cross_artifact_reconciliation.py \
            project/tests/regressions/test_runner_position_contract.py \
            project/tests/regressions/test_monitor_only_venue_immutability.py \
            project/tests/regressions/test_next_open_entry_accounting.py \
            project/tests/regressions/test_event_analyzer_full_market_requirement.py \
            project/tests/regressions/test_run_success_requires_outputs.py \
            project/tests/regressions/test_stage_registry_path_validity.py \
            project/tests/regressions/test_timeframe_contracts.py \
            project/tests/regressions/test_storage_fallback_respected.py \
            project/tests/regressions/test_bundle_policy_consistency.py

      - name: 6. Static Type Check (Pyright)
        run: pyright project
