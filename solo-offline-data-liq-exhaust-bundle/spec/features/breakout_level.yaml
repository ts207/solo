feature_family: trend
version: 1.0.0
base_timeframe: 1m
inputs:
  - dataset: perp_ohlcv_1m
    columns: [high, low]
features:
  - name: breakout_level
    description: "Price level representing recent structural breakout point."
    formula: "rolling_max(high, window)"
    params: {window: 96}
provenance:
  source_id: "synthetic"
  claim_id: []
  pit_constraint: "asof <= t0"
