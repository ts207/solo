feature_family: trend
version: 1.0.0
base_timeframe: 1m
inputs:
  - dataset: perp_ohlcv_1m
    columns: [close]
features:
  - name: trend_band
    description: "Moving average band or envelope for trend reference."
    formula: "ema(close, window)"
    params: {window: 96}
provenance:
  source_id: "synthetic"
  claim_id: []
  pit_constraint: "asof <= t0"
