matrix_id: regime_shakeout_v1
defaults:
  objective_name: retail_profitability
  run_mode: research
  promotion_profile: disabled
  timeframe: 5m
  horizons_bars: [12, 24]
  directions: [long, short]
  entry_lags: [1]
symbols:
  - BTCUSDT
  - ETHUSDT
windows:
  - label: 2022_h1
    start: "2022-01-01"
    end: "2022-06-30"
  - label: 2022_h2
    start: "2022-07-01"
    end: "2022-12-31"
regimes:
  - canonical_regime: LIQUIDITY_STRESS
    raw_control_events:
      - ABSORPTION_PROXY
      - DEPTH_COLLAPSE
      - LIQUIDITY_GAP_PRINT
      - LIQUIDITY_SHOCK
      - LIQUIDITY_VACUUM
      - ORDERFLOW_IMBALANCE_SHOCK
      - SPREAD_BLOWOUT
      - SWEEP_STOPRUN
  - canonical_regime: CROSS_ASSET_DESYNCHRONIZATION
    raw_control_events:
      - CROSS_ASSET_DESYNC_EVENT
      - INDEX_COMPONENT_DIVERGENCE
      - LEAD_LAG_BREAK
  - canonical_regime: BASIS_FUNDING_DISLOCATION
    raw_control_events:
      - BASIS_DISLOC
      - CROSS_VENUE_DESYNC
      - FND_DISLOC
      - FUNDING_EXTREME_ONSET
      - FUNDING_FLIP
