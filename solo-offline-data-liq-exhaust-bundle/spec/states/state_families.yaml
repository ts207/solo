version: 1
kind: state_family_registry
metadata:
  status: generated
  generated_notice: GENERATED FILE - DO NOT EDIT
  authored_sources:
  - spec/states/*.yaml
  read_model: true
defaults:
  state_scope: source_only
  min_events: 200
  runtime:
    enabled: true
    instrument_classes:
    - crypto
    tags: []
context_dimensions:
  carry_state:
    allowed_values:
    - funding_neg
    - funding_pos
    mapping:
      funding_neg: FUNDING_NEGATIVE
      funding_pos: FUNDING_POSITIVE
  funding_regime:
    allowed_values:
    - crowded
    - normalizing
    mapping:
      crowded: CROWDING_STATE
      normalizing: FUNDING_NORMALIZATION_STATE
  liquidity_regime:
    allowed_values:
    - low
    - refill
    mapping:
      low: LOW_LIQUIDITY_STATE
      refill: REFILL_LAG_STATE
  ms_spread_state:
    allowed_values:
    - tight
    - wide
    mapping:
      tight: SPREAD_TIGHT
      wide: SPREAD_WIDE
  ms_trend_state:
    allowed_values:
    - trend
    - chop
    mapping:
      trend: TREND_ACTIVE
      chop: CHOP_ACTIVE
  trend_structure:
    allowed_values:
    - trend
    - chop
    mapping:
      trend: TRENDING_STATE
      chop: CHOP_STATE
  vol_regime:
    allowed_values:
    - low
    - high
    mapping:
      low: LOW_VOL_REGIME
      high: HIGH_VOL_REGIME
state_families:
- name: carry_state
  allowed_values:
  - funding_neg
  - funding_pos
  source_feature: funding_rate_bps
  canonical_metrics:
  - funding_rate_bps
  thresholds:
  - -0.1
  - 0.1
  update_cadence: 8h
  acceptance_test_id: CARRY_STABILITY_V1
- name: funding_regime
  allowed_values:
  - crowded
  - normalizing
  source_feature: funding_regime
- name: liquidity_regime
  allowed_values:
  - low
  - refill
  source_feature: liquidity_regime
- name: ms_spread_state
  allowed_values:
  - tight
  - wide
  source_feature: ms_spread_state
- name: ms_trend_state
  allowed_values:
  - trend
  - chop
  source_feature: ms_trend_state
- name: trend_structure
  allowed_values:
  - trend
  - chop
  source_feature: trend_structure
- name: vol_regime
  allowed_values:
  - low
  - high
  source_feature: rv_percentile_24h
  canonical_metrics:
  - rv_percentile_24h
  thresholds:
  - 0.33
  - 0.66
  update_cadence: 1h
  acceptance_test_id: VOL_REG_STABILITY_V1
