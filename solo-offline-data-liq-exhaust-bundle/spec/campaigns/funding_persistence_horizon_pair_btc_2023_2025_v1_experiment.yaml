program_id: funding_persistence_horizon_pair_btc_2023_2025_v1
run_mode: research
description: >
  Bounded current-data confirmation for the durable BTCUSDT funding persistence
  continuation branch. Test only FUNDING_PERSISTENCE_TRIGGER, long direction,
  continuation template, and 24/48 bar horizons over 2023-2025. This checks
  whether the 24/48 horizon pair can be carried forward as one horizon-sensitive
  mechanism without adding symbols, OI confirmation, regime filters, or ETH
  portability.

instrument_scope:
  instrument_classes:
    - crypto
  symbols:
    - BTCUSDT
  timeframe: 5m
  start: "2023-01-01"
  end: "2025-12-31"

trigger_space:
  allowed_trigger_types:
    - EVENT
  events:
    include:
      - FUNDING_PERSISTENCE_TRIGGER

templates:
  include:
    - continuation

evaluation:
  horizons_bars:
    - 24
    - 48
  directions:
    - long
  entry_lags:
    - 1

contexts:
  include: {}

avoid_region_keys: []

search_control:
  max_hypotheses_total: 2
  max_hypotheses_per_template: 2
  max_hypotheses_per_event_family: 2
  random_seed: 42

promotion:
  enabled: false
  track: standard
  multiplicity_scope: program_id

artifacts:
  matrix_phase: funding_persistence_horizon_pair
  discovery_parent_run_id: funding_template_discovery_20260422T0100Z
  yearly_slice_parent_runs:
    - funding_continuation_slice_2023_20260422T0115Z
    - funding_continuation_slice_2024_20260422T0115Z
    - funding_continuation_slice_2025_20260422T0115Z
  no_promotion_or_export: true
  decision_rule: >
    Carry the pair forward only if both 24b and 48b remain bridge-tradable on
    current data; otherwise collapse to the surviving horizon.
