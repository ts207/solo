program_id: single_event_liq_exhaustion_reversal_down_bounce_v1
run_mode: research
description: >
  Single-event downside liquidation exhaustion reversal test for BTCUSDT:
  when a down liquidation exhaustion event occurs, evaluate long mean reversion
  over 3/12/24 bars after costs.

instrument_scope:
  instrument_classes:
    - crypto
  symbols:
    - BTCUSDT
  timeframe: 5m
  start: "2022-01-01"
  end: "2024-12-31"

trigger_space:
  allowed_trigger_types:
    - EVENT
  events:
    include:
      - event_id: LIQUIDATION_EXHAUSTION_REVERSAL
        event_direction: down

templates:
  include:
    - exhaustion_reversal

evaluation:
  horizons_bars:
    - 3
    - 12
    - 24
  directions:
    - long
  entry_lags:
    - 1

contexts:
  include: {}

avoid_region_keys: []

search_control:
  max_hypotheses_total: 10
  max_hypotheses_per_template: 10
  max_hypotheses_per_event_family: 10
  random_seed: 42

promotion:
  enabled: false
  track: standard
  multiplicity_scope: program_id

artifacts: {}
