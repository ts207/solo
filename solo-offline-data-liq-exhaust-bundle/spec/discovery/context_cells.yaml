version: edge_cells_v1
context_cells:
  - id: high_vol
    dimension: vol_regime
    values: [high]
    required_feature_key: high_vol_regime
    executability_class: runtime
    max_conjunction_depth: 1
  - id: low_vol
    dimension: vol_regime
    values: [low]
    required_feature_key: low_vol_regime
    executability_class: runtime
    max_conjunction_depth: 1
  - id: positive_funding
    dimension: carry_state
    values: [funding_pos]
    required_feature_key: carry_state
    executability_class: supportive_only
    supportive_context:
      canonical_regime: BASIS_FUNDING_DISLOCATION
      support_dimension: carry_state
      support_values: [funding_pos]
    max_conjunction_depth: 1
