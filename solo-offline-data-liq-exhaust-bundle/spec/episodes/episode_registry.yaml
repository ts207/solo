version: 1
kind: episode_registry
episodes:
  EP_VOLATILITY_BREAKOUT:
    title: Volatility breakout episode
    description: Compression gives way to a directional volatility release and follow-through.
    causal_mechanism: Thin post-compression liquidity allows directional imbalance to expand into a volatility shock.
    required_events:
      - RANGE_COMPRESSION_END
      - VOL_SHOCK
    optional_confirmation_events:
      - VOL_SPIKE
    invalidation_events:
      - FALSE_BREAKOUT
    disallowed_regimes:
      - SCHEDULED_TEMPORAL_WINDOW
    tier: B
    operational_role: trigger
    deployment_disposition: secondary_trigger_candidate
    sequence_mode: ordered_strict
    minimum_required_events: 2
    runtime_min_required_events: 1
    runtime_hint: transition_or_volatility_move
  EP_LIQUIDITY_SHOCK:
    title: Liquidity shock episode
    description: Microstructure thins, spreads widen, and a price shock emerges into unstable conditions.
    causal_mechanism: Liquidity withdrawal and spread widening amplify otherwise manageable order flow into a shock event.
    required_events:
      - LIQUIDITY_VACUUM
      - VOL_SHOCK
    optional_confirmation_events:
      - VOL_SPIKE
    invalidation_events:
      - MEAN_REVERSION_SIGNAL
    disallowed_regimes:
      - SCHEDULED_TEMPORAL_WINDOW
    tier: B
    operational_role: trigger
    deployment_disposition: secondary_trigger_candidate
    sequence_mode: ordered_strict
    minimum_required_events: 2
    runtime_min_required_events: 1
    runtime_hint: wide_spread_and_thin_depth
  EP_DISLOCATION_REPAIR:
    title: Dislocation repair episode
    description: A venue or basis dislocation normalizes as absorption and repair liquidity emerge.
    causal_mechanism: Temporary dislocation attracts balancing flow and absorption, creating a bounded repair window.
    required_events:
      - CROSS_VENUE_DESYNC
      - ABSORPTION_EVENT
    optional_confirmation_events:
      - VOL_SHOCK
    invalidation_events:
      - TREND_ACCELERATION
    disallowed_regimes: []
    tier: C
    operational_role: context
    deployment_disposition: context_only
    sequence_mode: ordered_strict
    minimum_required_events: 2
    runtime_min_required_events: 1
    runtime_hint: desync_reversion
