version: 1
kind: episode_contract_schema
required_fields:
  - title
  - description
  - causal_mechanism
  - required_events
  - tier
  - operational_role
  - deployment_disposition
  - sequence_mode
optional_fields:
  - optional_confirmation_events
  - invalidation_events
  - disallowed_regimes
  - minimum_required_events
  - runtime_min_required_events
  - runtime_hint
notes:
  runtime_min_required_events allows monitor-only/live heuristic activation before full sequence confirmation.
