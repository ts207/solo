phase2_defaults:
  discovery_profile: standard
  gate_profile: discovery
  min_t_stat: 1.5
  min_n: 30

adoption:
  selected_mode: D
  selected_label: hierarchical_v2_with_folds
  evidence_report: data/reports/benchmarks/canonical_d_only_20260418/canonical_path_report.md
  rationale: >-
    Use one canonical operator path: hierarchical search with v2 scoring,
    repeated walk-forward folds, ledger adjustment disabled, and diversified
    shortlist disabled.

benchmark_modes:
