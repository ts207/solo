workflow_id: golden_certification_v1
golden_workflow_config: project/configs/golden_workflow.yaml
runtime_run_id: smoke_run
runtime_mode: monitor_only
stale_threshold_sec: 60.0
freshness_streams:
  - symbol: BTCUSDT
    stream: kline_5m
  - symbol: ETHUSDT
    stream: kline_5m
oms_lineage:
  order_source: smoke_oms
  session_id: golden-certification-session
live_state_snapshot_path: reliability/live_state.json
microstructure_recovery_streak: 3
account_sync_interval_seconds: 30.0
account_sync_failure_threshold: 3
execution_degradation_min_samples: 3
execution_degradation_warn_edge_bps: 0.0
execution_degradation_block_edge_bps: -5.0
execution_degradation_throttle_scale: 0.5
required_outputs:
  - reliability/golden_workflow_summary.json
  - reliability/runtime_certification_manifest.json
  - reliability/golden_certification_summary.json
benchmark_matrix_path: spec/benchmarks/regime_shakeout_matrix.yaml
enforce_benchmark_certification: false
