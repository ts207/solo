version: 1
kind: context_registry
metadata:
  status: generated
  authored_sources:
  - spec/states/*.yaml
  - spec/contexts/context_dimension_registry.yaml
  generated_notice: GENERATED FILE - DO NOT EDIT
context_dimensions:
  carry_state:
    allowed_values:
    - funding_neg
    - funding_pos
    mapping:
      funding_neg: FUNDING_NEGATIVE
      funding_pos: FUNDING_POSITIVE
  funding_regime:
    allowed_values:
    - crowded
    - normalizing
    mapping:
      crowded: CROWDING_STATE
      normalizing: FUNDING_NORMALIZATION_STATE
  liquidity_regime:
    allowed_values:
    - low
    - refill
    mapping:
      low: LOW_LIQUIDITY_STATE
      refill: REFILL_LAG_STATE
  ms_spread_state:
    allowed_values:
    - tight
    - wide
    mapping:
      tight: SPREAD_TIGHT
      wide: SPREAD_WIDE
  ms_trend_state:
    allowed_values:
    - trend
    - chop
    mapping:
      trend: TREND_ACTIVE
      chop: CHOP_ACTIVE
  trend_structure:
    allowed_values:
    - trend
    - chop
    mapping:
      trend: TRENDING_STATE
      chop: CHOP_STATE
  vol_regime:
    allowed_values:
    - low
    - high
    mapping:
      low: LOW_VOL_REGIME
      high: HIGH_VOL_REGIME
legacy_context_aliases: {}
