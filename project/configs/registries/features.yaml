version: 1

features:
  rsi_14:
    type: bounded
    allowed_operators: [">", "<", ">=", "<="]
    threshold_mode: absolute
    instrument_classes: [crypto, equities, futures]
    description: "Relative Strength Index (14 periods)."

  adx_14:
    type: continuous
    allowed_operators: [">", "<", ">=", "<="]
    threshold_mode: absolute
    instrument_classes: [crypto, equities, futures]
    description: "Average Directional Index (14 periods)."

  spread_z_30:
    type: zscore
    allowed_operators: [">", "<", ">=", "<="]
    threshold_mode: zscore
    instrument_classes: [crypto, equities, futures]
    description: "Z-score of the bid-ask spread over 30 periods."

  depth_imbalance_10:
    type: continuous
    allowed_operators: [">", "<", ">=", "<="]
    threshold_mode: absolute
    instrument_classes: [crypto, equities, futures]
    description: "Order book depth imbalance (L1-L10 sum ratio)."

  vol_spike_ratio:
    type: continuous
    allowed_operators: [">", "<", ">=", "<="]
    threshold_mode: absolute
    instrument_classes: [crypto, equities, futures]
    description: "Current volume / median volume."
