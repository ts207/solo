program_id: "sol_positioning_v1"
run_mode: "research"
description: "SOL 1h experiment with Positioning Extremes"
instrument_scope:
  instrument_classes: ["crypto"]
  symbols: ["SOLUSDT"]
  timeframe: "1h"
  start: "2024-01-01"
  end: "2024-04-01"
trigger_space:
  allowed_trigger_types: ["EVENT", "STATE"]
  events:
    include: ["FUNDING_EXTREME_ONSET", "LIQUIDATION_CASCADE"]
  states:
    include: ["CROWDING_STATE", "MS_LIQUIDATION_STATE"]
templates:
  include: ["mean_reversion"]
evaluation:
  horizons_bars: [4, 8]
  directions: ["long", "short"]
  entry_lags: [0]
contexts:
  include: {}
search_control:
  max_hypotheses_total: 100
  max_hypotheses_per_template: 50
  max_hypotheses_per_event_family: 50
promotion:
  enabled: false
