version: 1
kind: discovery_benchmark_spec
# ─────────────────────────────────────────────────────────────────────────────
# INTEGRITY REQUIREMENT: All events listed here MUST exist in the canonical
# event registry at spec/events/event_registry_unified.yaml.
# Ticker notation MUST use perpetual-market format (e.g. BTCUSDT, ETHUSDT).
# Do NOT use spot or Yahoo Finance notation (dash-separated or slash-separated pairs).
# See docs/94_discovery_benchmarks.md § Benchmark Integrity Requirements.
# ─────────────────────────────────────────────────────────────────────────────
cases:
  - id: simple_event
    description: >
      Strong, well-represented volatility event on liquid BTC perpetual.
      Exercises: high event frequency, clear signal, expected non-trivial
      candidate set. Registry event: VOL_SPIKE.
    symbol: "BTCUSDT"
    search_spec:
      events: ["VOL_SPIKE"]
      horizons: ["1h", "4h"]
      expression_templates: ["continuation", "mean_reversion"]
      max_candidates_per_run: 50

  - id: medium_complexity
    description: >
      Two complementary events — liquidation cascade and volatility shock —
      on BTC. Exercises: multi-event search, divergent candidate sets,
      moderate noise level. Registry events: LIQUIDATION_CASCADE, VOL_SHOCK.
    symbol: "BTCUSDT"
    search_spec:
      events: ["LIQUIDATION_CASCADE", "VOL_SHOCK"]
      horizons: ["15m", "1h"]
      expression_templates: ["reversal", "continuation"]
      max_candidates_per_run: 100

  - id: high_candidate_noise
    description: >
      Funding extreme onset on ETH — high candidate-to-discovery ratio,
      noisy event with periodic 8h structure. Exercises: multiplicity
      correction under high-volume search. Registry event: FUNDING_EXTREME_ONSET.
    symbol: "ETHUSDT"
    search_spec:
      events: ["FUNDING_EXTREME_ONSET"]
      horizons: ["5m", "15m", "1h"]
      expression_templates: ["continuation", "mean_reversion"]
      max_candidates_per_run: 500

  - id: historically_promotable
    description: >
      Trend acceleration on BTC — historically shows directional edge in
      trending regimes. Exercises: high-quality signal path, expected strong
      promotion density in top ranks. Registry event: TREND_ACCELERATION.
    symbol: "BTCUSDT"
    search_spec:
      events: ["TREND_ACCELERATION"]
      horizons: ["4h", "1h"]
      expression_templates: ["continuation"]
      max_candidates_per_run: 20

  - id: historically_weak
    description: >
      Funding timestamp event on BTC — low-information, scheduled mechanical
      event. Exercises: low-expectancy baseline; benchmark should produce
      few or no discoveries. Registry event: FUNDING_TIMESTAMP_EVENT.
    symbol: "BTCUSDT"
    search_spec:
      events: ["FUNDING_TIMESTAMP_EVENT"]
      horizons: ["5m", "15m"]
      expression_templates: ["continuation"]
      max_candidates_per_run: 50
