version: 1
kind: thesis_registry
schema_version: thesis_registry_v1
notes:
  - Canonical authored thesis clauses for runtime-facing thesis definitions.
  - Packaged promoted thesis payloads may add evidence, lineage, and deployment outcomes,
    but clause semantics should originate here when a thesis contract is defined.
defaults:
  timeframe: 5m
  event_side: both
  required_context: {}
  supportive_context:
    has_realized_oos_path: false
  expected_response: {}
  invalidation: {}
  freshness_policy:
    allowed_staleness_classes:
      - fresh
      - watch
    require_review_due_date: false
  governance:
    trade_trigger_eligible: true
    requires_stronger_evidence: false
  symbol_scope:
    mode: symbol_set
theses:
  THESIS_BASIS_DISLOC:
    identity:
      thesis_id: THESIS_BASIS_DISLOC
      thesis_kind: standalone_event
      event_family: BASIS_DISLOC
      timeframe: 5m
      event_side: both
    source:
      event_contract_ids:
        - BASIS_DISLOC
      episode_contract_ids: []
    clauses:
      trigger_events:
        - BASIS_DISLOC
      confirmation_events: []
      required_episodes: []
      disallowed_regimes: []
    governance:
      operational_role: trigger
      evidence_mode: direct
    supportive_context:
      canonical_regime: BASIS_FUNDING_DISLOCATION
    expected_response:
      response_class: basis_dislocation_continuation_or_repair
    detection:
      detector_kind: basis_disloc
      symbols:
        - BTCUSDT
      horizons:
        - 8
        - 16
        - 24
      payoff_mode: absolute_return
      fees_bps: 6.0
      params:
        z_threshold: 5.0
        lookback_window: 288
        cooldown_bars: 12
        min_basis_bps: 10.0
    notes: Basis dislocation thesis uses canonical feature-schema basis fields when
      spot-perp paired raw bars are not available as a dedicated input dataset.
  THESIS_FND_DISLOC:
    identity:
      thesis_id: THESIS_FND_DISLOC
      thesis_kind: standalone_event
      event_family: FND_DISLOC
      timeframe: 5m
      event_side: both
    source:
      event_contract_ids:
        - FND_DISLOC
      episode_contract_ids: []
    clauses:
      trigger_events:
        - FND_DISLOC
      confirmation_events: []
      required_episodes: []
      disallowed_regimes: []
    governance:
      operational_role: trigger
      evidence_mode: direct
    supportive_context:
      canonical_regime: BASIS_FUNDING_DISLOCATION
    expected_response:
      response_class: funding_dislocation_continuation_or_repair
    detection:
      detector_kind: fnd_disloc
      symbols:
        - BTCUSDT
      horizons:
        - 8
        - 16
        - 24
      payoff_mode: absolute_return
      fees_bps: 6.0
      params:
        z_threshold: 5.0
        lookback_window: 288
        threshold_bps: 2.0
        funding_quantile: 0.95
        alignment_window: 3
        cooldown_bars: 12
        min_basis_bps: 5.0
    notes: Funding dislocation thesis uses canonical basis and funding features from
      the feature schema when dedicated raw inputs are not sufficient on their own.
  THESIS_VOL_SHOCK:
    identity:
      thesis_id: THESIS_VOL_SHOCK
      thesis_kind: standalone_event
      event_family: VOL_SHOCK
      timeframe: 5m
      event_side: both
    source:
      event_contract_ids:
        - VOL_SHOCK
      episode_contract_ids: []
    clauses:
      trigger_events:
        - VOL_SHOCK
      confirmation_events: []
      required_episodes: []
      disallowed_regimes: []
    governance:
      operational_role: trigger
      evidence_mode: direct
    supportive_context:
      canonical_regime: VOLATILITY_TRANSITION
    expected_response:
      response_class: volatility_expansion
    detection:
      detector_kind: vol_shock
      symbols:
        - BTCUSDT
        - ETHUSDT
      horizons:
        - 8
        - 16
        - 24
      payoff_mode: absolute_return
      fees_bps: 6.0
      params:
        rv_window: 12
        baseline_window: 288
        shock_quantile: 0.95
    notes: Raw-data evidence uses absolute post-shock move, which matches the contract's
      volatility-expansion semantics better than directional continuation.
  THESIS_LIQUIDITY_VACUUM:
    identity:
      thesis_id: THESIS_LIQUIDITY_VACUUM
      thesis_kind: standalone_event
      event_family: LIQUIDITY_VACUUM
      timeframe: 5m
      event_side: both
    source:
      event_contract_ids:
        - LIQUIDITY_VACUUM
      episode_contract_ids: []
    clauses:
      trigger_events:
        - LIQUIDITY_VACUUM
      confirmation_events: []
      required_episodes: []
      disallowed_regimes: []
    governance:
      operational_role: trigger
      evidence_mode: direct
    supportive_context:
      canonical_regime: LIQUIDITY_STRESS
    expected_response:
      response_class: liquidity_stress_continuation
    detection:
      detector_kind: liquidity_vacuum
      symbols:
        - BTCUSDT
        - ETHUSDT
      horizons:
        - 8
        - 16
        - 24
      payoff_mode: absolute_return
      fees_bps: 6.0
      params:
        shock_quantile: 0.95
        shock_window: 288
        volume_window: 36
        vol_ratio_floor: 0.9
        range_multiplier: 1.1
        lookahead_bars: 3
        min_vacuum_bars: 1
    notes: Raw-data evidence uses post-event absolute move after low-volume, wide-range
      continuation bars following the initiating shock.
  THESIS_LIQUIDATION_CASCADE:
    identity:
      thesis_id: THESIS_LIQUIDATION_CASCADE
      thesis_kind: standalone_event
      event_family: LIQUIDATION_CASCADE
      timeframe: 5m
      event_side: both
    source:
      event_contract_ids:
        - LIQUIDATION_CASCADE
      episode_contract_ids: []
    clauses:
      trigger_events:
        - LIQUIDATION_CASCADE
      confirmation_events: []
      required_episodes: []
      disallowed_regimes: []
    governance:
      operational_role: trigger
      evidence_mode: direct
    supportive_context:
      canonical_regime: FORCED_FLOW
    expected_response:
      response_class: forced_flow_aftershock
    detection:
      detector_kind: liquidation_cascade
      symbols:
        - BTCUSDT
        - ETHUSDT
      horizons:
        - 8
        - 16
        - 24
      payoff_mode: absolute_return
      fees_bps: 6.0
      params:
        shock_quantile: 0.975
        shock_window: 288
        oi_window: 12
        oi_drop_quantile: 0.05
        funding_window: 720
        funding_z: 1.5
    notes: Raw-data evidence uses a forced-flow proxy requiring an extreme return shock,
      large open-interest drop, and concurrent funding stretch.
  THESIS_VOL_SHOCK_LIQUIDITY_CONFIRM:
    identity:
      thesis_id: THESIS_VOL_SHOCK_LIQUIDITY_CONFIRM
      thesis_kind: event_plus_confirm
      event_family: VOL_SHOCK
      timeframe: 5m
      event_side: both
    source:
      event_contract_ids:
        - VOL_SHOCK
        - LIQUIDITY_VACUUM
      episode_contract_ids: []
    clauses:
      trigger_events:
        - VOL_SHOCK
      confirmation_events:
        - LIQUIDITY_VACUUM
      required_episodes: []
      disallowed_regimes: []
    governance:
      operational_role: confirm
      evidence_mode: direct
      requires_stronger_evidence: true
    supportive_context:
      canonical_regime: VOLATILITY_TRANSITION
    expected_response:
      response_class: confirmation_strengthens_volatility_thesis
    detection:
      detector_kind: vol_shock_liquidity_confirm
      symbols:
        - BTCUSDT
        - ETHUSDT
      horizons:
        - 8
        - 16
        - 24
      payoff_mode: absolute_return
      fees_bps: 6.0
      params:
        confirmation_window_bars: 3
        require_confirmation_after_trigger: true
        trigger_kind: vol_shock
        confirm_kind: liquidity_vacuum
        trigger_params:
          rv_window: 12
          baseline_window: 288
          shock_quantile: 0.95
        confirm_params:
          shock_quantile: 0.95
          shock_window: 288
          volume_window: 36
          vol_ratio_floor: 0.9
          range_multiplier: 1.1
          lookahead_bars: 3
          min_vacuum_bars: 1
    notes: Raw-data evidence requires a VOL_SHOCK trigger with a nearby LIQUIDITY_VACUUM
      confirmation, producing a stronger post-shock move thesis than either event alone.
  THESIS_LIQUIDITY_VACUUM_CASCADE_CONFIRM:
    identity:
      thesis_id: THESIS_LIQUIDITY_VACUUM_CASCADE_CONFIRM
      thesis_kind: event_plus_confirm
      event_family: LIQUIDITY_VACUUM
      timeframe: 5m
      event_side: both
    source:
      event_contract_ids:
        - LIQUIDITY_VACUUM
        - LIQUIDATION_CASCADE
      episode_contract_ids: []
    clauses:
      trigger_events:
        - LIQUIDITY_VACUUM
      confirmation_events:
        - LIQUIDATION_CASCADE
      required_episodes: []
      disallowed_regimes: []
    governance:
      operational_role: confirm
      evidence_mode: direct
      requires_stronger_evidence: true
    supportive_context:
      canonical_regime: LIQUIDITY_STRESS
    expected_response:
      response_class: liquidity_stress_forced_flow_confirmation
    detection:
      detector_kind: paired_confirmation
      symbols:
        - BTCUSDT
        - ETHUSDT
      horizons:
        - 24
        - 32
        - 48
      payoff_mode: absolute_return
      fees_bps: 6.0
      params:
        confirmation_window_bars: 24
        require_confirmation_after_trigger: false
        trigger_kind: liquidity_vacuum
        confirm_kind: liquidation_cascade
        trigger_params:
          shock_quantile: 0.95
          shock_window: 288
          volume_window: 36
          vol_ratio_floor: 0.9
          range_multiplier: 1.1
          lookahead_bars: 3
          min_vacuum_bars: 1
        confirm_params:
          shock_quantile: 0.975
          shock_window: 288
          oi_window: 12
          oi_drop_quantile: 0.05
          funding_window: 720
          funding_z: 1.5
    notes: Raw-data evidence requires LIQUIDITY_VACUUM to appear in the same local stress
      window as LIQUIDATION_CASCADE, producing a stronger forced-flow/liquidity-stress
      setup than either event alone.
