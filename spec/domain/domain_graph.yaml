    tier: A
    operational_role: trigger
    deployment_disposition: primary_trigger_candidate
    runtime_category: active_runtime_event
    maturity: ''
    default_executable: true
    detector_band: research_trigger
    planning_eligible: false
    runtime_eligible: false
    promotion_eligible: false
    primary_anchor_eligible: false
    enabled: true
    detector_name: VolShockRelaxationDetector
    instrument_classes:
    - crypto
    - futures
    requires_features: []
    runtime_tags:
    - vol_regime
    - high_urgency
    sequence_eligible: true
    cluster_id: vol_regime
    collapse_target: ''
    overlap_group: ''
    precedence_rank: 0
    routing_profile_ref: ''
    suppresses: []
    suppressed_by: []
    maturity_scores: {}
    parameters:
      merge_gap_bars: 1
      cooldown_bars: 0
      anchor_rule: max_intensity
      min_occurrences: 0
      synthetic_coverage: covered
      detector_contract: true
      detector:
        signal_definition: 'Detects realized-volatility shock onset using a point-in-time-safe
          dynamic threshold on the realized-volatility shock ratio. The emitted event
          is the first bar where the shock ratio crosses above the dynamic threshold;
          post-event fields record relaxation and decay diagnostics, but the detector
          does not require a separate bootstrap-confirmed relaxation gate before emission.

          '
        formula: 'logret[i]        = log(close[i] / close[i-1])

          realized_vol[i]  = sqrt(mean(logret[i-rv_window+1..i]^2))

          rv_base[i]       = trailing_median(realized_vol, baseline_window, lag=1)[i]

          shock_ratio[i]   = realized_vol[i] / rv_base[i]

          shock_threshold[i] = trailing_quantile(shock_ratio, baseline_window, shock_quantile,
          lag=1)[i]

          onset[i]         = shock_ratio[i-1] < shock_threshold[i-1] AND shock_ratio[i]
          >= shock_threshold[i]

          relax_exit[j]    = first j >= i such that shock_ratio[j] <= relax_threshold
          for relax_consecutive_bars consecutive bars

          event            = onset[i]

          '
        required_columns:
        - timestamp
        - close
        lookback_bars: 288
        warmup_bars: 288
        bar_type: close_to_close
        timestamp_alignment: 'Event anchor at first bar crossing above the dynamic
          shock threshold (shock onset). Detected at bar close; downstream metadata
          records the subsequent relaxation boundary.

          '
        minimum_sample_size: 200
      calibration:
        default_threshold: 2.0
        search_range:
        - 1.5
        - 1.75
        - 2.0
        - 2.25
        - 2.5
        - 3.0
        calibration_target: 'Maximize stability of point-in-time shock-onset detection
          and usefulness of post-event decay telemetry (half-life, excess vol area,
          secondary-shock incidence) while keeping sufficient event counts per window.

          '
        stability_requirement: 'Shock threshold and onset frequency should remain
          stable across yearly splits and major symbols after accounting for realized-vol
          regime differences.

          '
        failure_modes:
        - Flat price series: vol near zero, ratio undefined
        - Persistent high-vol regime: shock threshold never exceeded
        - Insufficient warmup history for trailing median / quantile calibration
      expected_behavior:
        holding_horizon_bars: 8-48
        invalidation_conditions:
        - Realized vol re-expands above shock threshold within phase_tolerance_bars
        - Second shock occurs before first relaxation completes
        false_positive_scenarios:
        - Weekend low-liquidity vol collapse (not a true relaxation)
        - Session open vol spike that reverts mechanically
        - Thin-book instrument where vol is noise-dominated
        disabled_regimes:
        - LIQUIDITY_VACUUM active: vol signal unreliable during thin-book conditions
        - SCHEDULED_NEWS_WINDOW_EVENT: vol shock may be sustained, not relaxing
        expected_overlap:
        - LIQUIDITY_VACUUM: moderate; both activate post-impulse
        - SPREAD_BLOWOUT: low; different mechanisms
        - TREND_ACCELERATION: low but possible; trending vol differs from shock vol
      m_controls: 5
      bootstrap_iters: 1000
      phase_tolerance_bars: 16
      shock_quantile: 0.9
    runtime:
      templates:
      - mean_reversion
      - continuation
      - trend_continuation
      horizons:
      - 60m
      conditioning_cols:
      - vol_regime
      - vol_phase
      - carry_state
      - funding_phase
      - oi_phase
