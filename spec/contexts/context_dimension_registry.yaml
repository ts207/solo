version: 1
kind: context_dimension_registry
metadata:
  status: authored
  purpose: >
    Canonical context dimensions for event-template-context research units.
    Contexts are stateful market conditions, not local template hints.

dimensions:
  vol_phase:
    values:
      compressed: {}
      normal: {}
      expanding: {}
      shock:
        trade_bias: reduce_size_or_require_path_label
      aftershock:
        trade_bias: fade_or_pullback_only
      decaying:
        trade_bias: repair_or_mean_reversion_enabled

  liquidity_phase:
    values:
      normal: {}
      thin:
        size_multiplier: 0.50
      vacuum:
        size_multiplier: 0.00
        blocks_new_entries: true
      collapse:
        blocks_new_entries: true
      refill:
        enables_templates:
          - liquidity_refill_repair
          - forced_flow_rebound
      recovered: {}

  execution_friction:
    values:
      low: {}
      normal: {}
      elevated:
        size_multiplier: 0.50
      severe:
        size_multiplier: 0.25
      blocked:
        blocks_new_entries: true

  funding_phase:
    values:
      neutral: {}
      positive_onset:
        crowded_side: long
      negative_onset:
        crowded_side: short
      positive_persistent:
        crowded_side: long
      negative_persistent:
        crowded_side: short
      positive_normalizing:
        unwind_side: long
      negative_normalizing:
        unwind_side: short
      flip_to_positive: {}
      flip_to_negative: {}

  oi_phase:
    values:
      neutral: {}
      expansion: {}
      contraction: {}
      flush:
        trade_bias: deleveraging_or_rebound_setup
      rebuild: {}

  price_oi_quadrant:
    values:
      price_up_oi_up: {}
      price_up_oi_down: {}
      price_down_oi_up: {}
      price_down_oi_down: {}

  forced_flow_phase:
    values:
      none: {}
      pre_cascade: {}
      cascade:
        trade_bias: avoid_or_continuation_only
      cooldown:
        trade_bias: prepare_reversal
      refill:
        trade_bias: repair_enabled
      rebound_confirmed:
        trade_bias: reversal_enabled
      reacceleration:
        blocks_templates:
          - forced_flow_rebound
          - liquidity_refill_repair

  trend_phase:
    values:
      uptrend: {}
      downtrend: {}
      chop: {}
      compression: {}
      breakout: {}
      retest: {}
      exhaustion: {}
      transition: {}

  ms_trend_state:
    values:
      trend: {}
      chop: {}
      bullish:
        alias_of: trend
      bearish:
        alias_of: trend

  basis_phase:
    values:
      neutral: {}
      positive_dislocation: {}
      negative_dislocation: {}
      widening: {}
      converging: {}
      normalized: {}

  temporal_phase:
    values:
      normal: {}
      session_open: {}
      session_close: {}
      pre_funding_timestamp: {}
      post_funding_timestamp: {}
      pre_news:
        blocks_templates:
          - statistical_mean_reversion
          - funding_reset_reversion
      post_news: {}

  data_quality_state:
    values:
      ok: {}
      degraded:
        requires_quality_penalty: true
      stale:
        blocks_all_trade_templates: true
      missing_required_feature:
        blocks_all_trade_templates: true
      synthetic_only:
        research_only: true

context_gate:
  min_support: 50
  min_context_gain_bps: 5.0
  min_context_gain_ratio: 1.25
  max_support_loss_ratio: 0.80
  require_unconditional_not_opposite: false
  max_context_dims_discovery: 2
  max_context_dims_bridge: 1
