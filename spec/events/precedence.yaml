kind: event_precedence
version: 1

# Lower priority number = higher precedence = evaluated first.
# When events from different families conflict, higher-precedence family wins.
family_precedence:
  - family: EXECUTION_FRICTION
    priority: 1
    rationale: >
      Execution-blocking conditions gate all other templates.

  - family: TEMPORAL_STRUCTURE
    priority: 2
    rationale: >
      Scheduled events define regime validity windows for all other families.

  - family: VOLATILITY_TRANSITION
    priority: 3
    rationale: >
      Volatility state drives position sizing and holding horizon.

  - family: LIQUIDITY_DISLOCATION
    priority: 4
    rationale: >
      Liquidity state affects execution feasibility of all templates.

  - family: POSITIONING_EXTREMES
    priority: 5
    rationale: >
      Funding/OI extremes are high-conviction but require liquidity to execute.

  - family: FORCED_FLOW_AND_EXHAUSTION
    priority: 6
    rationale: >
      Forced liquidation events require vol and liquidity checks to have passed.

  - family: INFORMATION_DESYNC
    priority: 7
    rationale: >
      Cross-venue desync events are fast-decaying; conditional on execution feasibility.

  - family: TREND_STRUCTURE
    priority: 8
    rationale: >
      Trend events are slower-decaying and can be acted on after friction checks pass.

  - family: STATISTICAL_DISLOCATION
    priority: 9
    rationale: >
      Z-score and correlation breakdown events require confirmation from higher families.

  - family: REGIME_TRANSITION
    priority: 10
    rationale: >
      Regime shifts are long-horizon; lowest precedence for intraday arbitration.

# Per-event overrides supersede family precedence
event_overrides: []
