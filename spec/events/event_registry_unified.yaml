version: 1
kind: event_unified_registry
metadata:
  status: authoritative
  legacy_sources:
    event_defaults: spec/events/_defaults.yaml
    event_family_defaults: spec/events/_families.yaml
    event_specs_dir: spec/events
    template_registry: spec/templates/registry.yaml
  notes: Single event-centric schema for phase1+phase2 composition. Generated compatibility
    sidecars are downstream outputs only. research_family is the authoritative coarse
    search/template grouping; canonical_family is a generated compatibility alias
    of research_family; family-level defaults are applied directly to research_family
    buckets.
defaults:
  parameters:
    merge_gap_bars: 1
    cooldown_bars: 0
    anchor_rule: max_intensity
    min_occurrences: 0
  templates:
  - mean_reversion
  - continuation
  - trend_continuation
  - pullback_entry
  horizons:
  - 5m
  - 15m
  - 60m
  conditioning_cols:
  - vol_regime
  - vol_phase
  - carry_state
  - funding_phase
  - oi_phase
  - price_oi_quadrant
  - forced_flow_phase
  - liquidity_phase
  - execution_friction
  - trend_phase
  - basis_phase
  - temporal_phase
  - data_quality_state
  - funding_bps
  - ms_trend_state
  - ms_spread_state
  - severity_bucket
  max_candidates_per_run: 1000
families:
  BASIS_FUNDING_DISLOCATION:
    parameters: {}
    templates:
    - carry_unwind_reversal
    - carry_continuation_confirmed
    - basis_funding_convergence
    - basis_convergence
    - convexity_capture
    - only_if_funding
    - only_if_oi
    - only_if_regime
    - only_if_highvol
    - only_if_trend
    - tail_risk_avoid
  CROSS_ASSET_INTERACTION:
    parameters: {}
  EXECUTION_FRICTION:
    parameters: {}
    templates:
    - slippage_aware_filter
    - tail_risk_avoid
  FORCED_FLOW_AND_EXHAUSTION:
    parameters: {}
    templates:
    - forced_flow_rebound
    - cooldown_reversal
    - liquidity_refill_repair
    - momentum_fade
    - range_reversion
    - only_if_trend
    - only_if_regime
    - drawdown_filter
  INFORMATION_DESYNC:
    parameters: {}
    templates:
    - desync_repair
    - basis_convergence
    - basis_repair
    - lead_lag_follow
    - divergence_continuation
  LIQUIDITY_DISLOCATION:
    parameters: {}
    templates:
    - liquidity_refill_repair
    - stop_run_repair
    - overshoot_repair
    - only_if_liquidity
    - slippage_aware_filter
  LIQUIDITY_STRESS:
    parameters: {}
    templates:
    - mean_reversion
    - continuation
    - stop_run_repair
    - overshoot_repair
    - only_if_liquidity
    - slippage_aware_filter
    - only_if_regime
    - only_if_highvol
  ORDERFLOW:
    parameters: {}
  POSITIONING_EXTREMES:
    parameters: {}
    templates:
    - carry_unwind_reversal
    - carry_continuation_confirmed
    - squeeze_followthrough_confirmed
    - convexity_capture
    - only_if_funding
    - only_if_oi
    - tail_risk_avoid
  POSITIONING_UNWIND_DELEVERAGING:
    parameters: {}
    templates:
    - reversal_or_squeeze
    - mean_reversion
    - continuation
    - exhaustion_reversal
    - convexity_capture
    - only_if_funding
    - only_if_oi
    - only_if_regime
    - tail_risk_avoid
  PRICE_ACTION:
    parameters: {}
  REGIME_TRANSITION:
    parameters: {}
    templates:
    - only_if_regime
    - continuation
    - mean_reversion
    - drawdown_filter
    - tail_risk_avoid
  STATISTICAL_DISLOCATION:
    parameters: {}
    templates:
    - mean_reversion
    - overshoot_repair
    - tail_risk_avoid
  TEMPORAL_STRUCTURE:
    parameters: {}
    templates:
    - mean_reversion
    - continuation
    - tail_risk_avoid
    - only_if_no_news_window
  TREND_FAILURE_EXHAUSTION:
    parameters: {}
    templates:
    - mean_reversion
    - exhaustion_reversal
    - momentum_fade
    - range_reversion
    - only_if_trend
    - only_if_regime
    - only_if_highvol
    - drawdown_filter
  TREND_STRUCTURE:
    parameters: {}
    templates:
    - breakout_followthrough
    - false_breakout_reversal
    - pullback_entry
    - trend_continuation
    - continuation
    - only_if_trend
  VOLATILITY_TRANSITION:
    parameters: {}
    templates:
    - mean_reversion
    - continuation
    - trend_continuation
    - volatility_expansion_follow
    - pullback_entry
    - only_if_regime
