version: 1
kind: event_alias_policy
metadata:
  status: compatibility_only
  notes: Event aliases are load-time compatibility shims. They must not create
    separate planning, runtime, promotion, or detector identities.
aliases:
  ABSORPTION_EVENT:
    canonical_event_type: ABSORPTION_PROXY
    scope: load_time_compatibility
    planning_identity: false
    runtime_identity: false
    promotion_identity: false
    reason: Legacy detector registration name retained for old artifacts.
  BASIS_DISLOCATION:
    canonical_event_type: BASIS_DISLOC
    scope: load_time_compatibility
    planning_identity: false
    runtime_identity: false
    promotion_identity: false
    reason: Historical spelling retained for old proposals and reports.
  VOL_REGIME_SHIFT:
    canonical_event_type: VOL_REGIME_SHIFT_EVENT
    scope: load_time_compatibility
    planning_identity: false
    runtime_identity: false
    promotion_identity: false
    reason: Historical event id retained for old detector registrations.
  PRICE_DOWN_OI_DOWN:
    canonical_event_type: OI_SPIKE_NEGATIVE
    scope: runtime_identity
  PRICE_UP_OI_DOWN:
    canonical_event_type: OI_SPIKE_NEGATIVE
    scope: runtime_identity
