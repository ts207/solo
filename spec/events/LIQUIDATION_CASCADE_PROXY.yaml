signal_column: liquidation_cascade_proxy_event
identity:
  canonical_regime: LIQUIDATION_CASCADE
  subtype: liquidation_cascade_proxy
  phase: onset
  evidence_mode: proxy
  layer: canonical
  disposition: merge
  asset_scope: single_asset
  venue_scope: single_venue
governance:
  event_kind: market_event
  default_executable: true
  research_only: false
  strategy_only: false
  context_tag: false
  maturity: experimental
  tier: C
  operational_role: trigger
  deployment_disposition: secondary_or_confirm
  runtime_category: active_runtime_event
  is_composite: false
runtime:
  detector: LiquidationCascadeProxyDetector
  enabled: true
  instrument_classes:
  - crypto
  - futures
  requires_features: []
  runtime_tags:
  - oi_dynamic
  - liquidation_proxy
  sequence_eligible: true
  reports_dir: liquidation_events
  events_file: liquidation_cascade_proxy_events.parquet
  signal_column: liquidation_cascade_proxy_event
research_family: POSITIONING_EXTREMES
detector_contract: true
parameters:
  oi_window: 288
  vol_window: 288
  min_periods: 24
  oi_drop_quantile: 0.997
  vol_surge_quantile: 0.90
  ret_window: 3
  price_drop_th: 0.025
  min_episode_oi_reduction_pct: 0.0
  max_gap: 1
  anchor_rule: max_intensity
semantics:
  summary: >
    OI-native proxy for liquidation cascade. Detects simultaneous OI pct drop above
    rolling 99.7th percentile, volume surge above rolling 90th percentile, and short-window
    price drawdown >= 2.5% over a 3-bar lookback, then anchors the peak-intensity bar
    of each cascade-like episode. Does not require liquidation_notional feed.
  cluster_id: oi_dynamic
  overlap_group: liquidation_proxy
  notes: >
    Use when liquidation_notional data is unavailable (e.g., Bybit native data without
    cross-exchange liquidation feed). Expected to have lower precision than
    LIQUIDATION_CASCADE but comparable recall for large cascade events.
  precedence_rank: 1
routing:
  routing_profile_ref: LIQUIDATION_CASCADE
detector:
  signal_definition: >
    Detects liquidation-cascade-like conditions using only native exchange data.
    Fires when OI pct drop >= rolling_quantile(oi_pct_drop, oi_drop_quantile) AND
    taker_base_volume >= rolling_quantile(volume, vol_surge_quantile) AND
    min(low[i-ret_window:i]) / close[i-ret_window] - 1 <= -price_drop_th,
    then retains only episodes whose net OI reduction exceeds min_episode_oi_reduction_pct.
  formula: |
    oi_pct_drop[i]  = -(oi_delta_1h[i] / oi_notional[i])
    oi_drop_th[i]   = quantile(oi_pct_drop[1..i-1], oi_drop_quantile, window=oi_window)
    vol_th[i]       = quantile(taker_base_volume[1..i-1], vol_surge_quantile, window=vol_window)
    price_drop[i]   = -(min(low[i-ret_window:i]) / close[i-ret_window] - 1)
    mask[i]         = (oi_pct_drop >= oi_drop_th) AND (volume >= vol_th) AND (price_drop >= price_drop_th)
    episode         = contiguous mask episode with max_gap=1
    keep_episode    = oi_reduction_pct(episode) >= min_episode_oi_reduction_pct
    event           = peak-intensity bar of kept episode
  required_columns:
  - timestamp
  - oi_notional
  - oi_delta_1h
  - close
  - high
  - low
  - volume
  lookback_bars: 288
  warmup_bars: 288
  bar_type: bar_close
  timestamp_alignment: Event anchored at peak-intensity bar within episode.
  minimum_sample_size: 50
calibration:
  default_threshold: 0.995
  search_range:
  - 0.90
  - 0.92
  - 0.95
  - 0.97
  - 0.99
  - 0.995
  calibration_target: >
    Maximize AUC of forward return (price recovery) vs oi_reduction_pct.
    Require at least 30 events over calibration window.
  failure_modes:
  - Low-OI instrument: oi_delta_1h noisy, pct drop threshold unreliable
  - Trending OI regime (perpetual growth): baseline quantile inflates, events suppressed
  - Volume regime change: vol_th must be recalibrated per-regime
expected_behavior:
  holding_horizon_bars: 1-96
  invalidation_conditions:
  - OI recovers within 12 bars (false flush, not cascade)
  - Volume spike without directional price move (block trade, not forced selling)
  false_positive_scenarios:
  - Scheduled funding payment causing OI adjustment without forced liquidations
  - Delisting or partial rollover reducing OI mechanically
  disabled_regimes:
  - DELEVERAGING_WAVE active and unresolved: cascade already captured
  - LOW_LIQUIDITY_STATE active: oi_delta_1h noise inflates pct drop signal
  expected_overlap:
  - OI_FLUSH: high co-occurrence (OI_FLUSH is a subset without volume/price confirmation)
  - DELEVERAGING_WAVE: moderate co-occurrence for sustained unwinds
  - FUNDING_EXTREME_ONSET: low co-occurrence (proxy fires on execution, not funding level)
trigger: Detector triggers on OI drop + volume surge + price drop coincidence
confirmation: Post-detection price recovery confirms forced-selling exhaustion
cluster_id: oi_dynamic
interaction:
  suppresses: []
  suppressed_by: []
