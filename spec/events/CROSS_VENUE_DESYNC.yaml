parameters:
  window_end: 32
  anchor_mode: basis_shock
  anchor_quantile: 0.995
  revert_z: 0.5
  basis_lookback: 96
  persistence_bars: 2
  min_basis_bps: 35.0
semantics:
  summary: Cross-venue basis persistence folded into basis/funding dislocation.
  cluster_id: desync
  overlap_group: basis_desync
  notes: Cross-venue basis persistence folded into basis/funding dislocation.
  precedence_rank: 0
interaction:
  suppressed_by: []
  suppresses: []
routing:
  routing_profile_ref: BASIS_FUNDING_DISLOCATION
detector:
  signal_definition: 'Detects cross-venue price desynchronization: spot-perp basis
    (or inter-exchange basis) exceeds its extreme quantile, indicating one venue is
    lagging price discovery. Event exits when basis z-score reverts.

    '
  formula: 'basis[i]       = perp_close[i] - spot_close[i]

    basis_z[i]     = (basis[i] - mean(basis, basis_lookback)) / std(basis, basis_lookback)

    shock_th       = quantile(abs(basis_z), anchor_quantile) over basis_lookback

    shock_flag[i]  = abs(basis_z[i]) >= shock_th

    revert_flag[i] = abs(basis_z[i]) <= revert_z

    event onset    = shock_flag transitions False to True

    event exit     = first subsequent bar where revert_flag = True (capped at window_end)

    '
  required_columns:
  - timestamp
  - close_spot
  - close_perp
  lookback_bars: 96
  warmup_bars: 96
  bar_type: bar_close
  timestamp_alignment: 'Event detected at bar close of onset bar. window_end caps
    maximum event duration in bars.

    '
  minimum_sample_size: 96
calibration:
  default_threshold: 0.99
  search_range:
  - 0.95
  - 0.97
  - 0.98
  - 0.99
  - 0.995
  calibration_target: 'Maximize information ratio of mean-reversion return within
    window_end bars. Require at least 40 events per asset over calibration window.

    '
  stability_requirement: 'anchor_quantile consistent across BTC/ETH spot-perp pairs
    within 0.01. Hit rate of reversion within window_end > 55% on both halves.

    '
  failure_modes:
  - Single-venue data: basis undefined, detector disabled
  - Stale perp data feed: basis appears large but is a data artifact
  - Funding payment bar: basis jumps mechanically at funding timestamps
expected_behavior:
  holding_horizon_bars: 1-32
  invalidation_conditions:
  - Basis continues expanding beyond 2x onset z-score (no reversion setup)
  - New shock within window_end bars of prior event
  false_positive_scenarios:
  - Funding payment timestamps: instantaneous basis jump with no trading edge
  - Low-volume altcoins: basis is noise-driven, not informational
  - Market open: basis may be mechanically elevated at session start
  disabled_regimes:
  - FUNDING_TIMESTAMP_EVENT active: basis jump is mechanical
  - SPREAD_BLOWOUT active: execution cost exceeds basis reversion profit
  expected_overlap:
  - SPOT_PERP_BASIS_SHOCK: high co-occurrence; conceptually related
  - LIQUIDATION_CASCADE: moderate; cascade can create cross-venue desync
  - LIQUIDITY_VACUUM: low; different causal mechanism
trigger: Detector triggers on cross venue desync pattern
confirmation: Post-detection price action confirms signal validity
cluster_id: desync
