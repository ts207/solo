version: 1
kind: event
event_type: LIQUIDITY_VACUUM
synthetic_coverage: covered
reports_dir: liquidity_vacuum
events_file: liquidity_vacuum_events.parquet
signal_column: liquidity_vacuum_event
research_family: LIQUIDITY_DISLOCATION
detector_contract: true
parameters:
  profile: lenient
  min_events_calibration: 1
  shock_quantiles: 0.5,0.6,0.7
  def_version: v1
  shock_quantile: 0.99
  shock_threshold_mode: rolling
  volume_window: 24
  range_window: 24
  vol_ratio_floor: 0.95
  range_multiplier: 1.05
  min_vacuum_bars: 1
  max_vacuum_bars: 96
  post_horizon_bars: 96
  auc_horizon_bars: 96
  range_expansion_threshold: 0.02
  merge_gap_bars: 2
  cooldown_bars: 12
  anchor_rule: max_intensity
  min_occurrences: 3
  median_window: 288
  min_periods: 24
  vacuum_depth_ratio_max: 0.3
  vacuum_spread_ratio_min: 2.5
detector:
  signal_definition: Direct depth/spread liquidity vacuum. Detects thin-book stress
    when live depth collapses and spread widens versus lagged trailing medians.
  formula: 'depth_ratio[i] = depth_usd[i] / trailing_median(depth_usd, median_window,
    lag=1)[i]

    spread_ratio[i] = spread_bps[i] / trailing_median(spread_bps, median_window, lag=1)[i]

    direct_vacuum[i] = depth_ratio[i] <= vacuum_depth_ratio_max AND spread_ratio[i]
    >= vacuum_spread_ratio_min AND evidence_tier == direct

    proxy_vacuum is research/context only and never standalone trade eligible.'
  required_columns:
  - timestamp
  - close
  - high
  - low
  - depth_usd
  - spread_bps
  live_trade_required_columns:
  - depth_usd
  - spread_bps
  proxy_mode_policy: Proxy-derived liquidity vacuum is research/risk-context only;
    raw LIQUIDITY_VACUUM is never an entry trigger. Use LIQUIDITY_VACUUM_RECOVERY
    for tradeability confirmation.
  lookback_bars: 480
  warmup_bars: 480
  bar_type: bar_close
  timestamp_alignment: 'Event detected_ts = timestamp of last vacuum bar (exit bar).
    Signal available at bar close; no intrabar lookahead.

    '
  minimum_sample_size: 50
calibration:
  default_threshold: 0.99
  search_range:
  - 0.5
  - 0.6
  - 0.7
  - 0.8
  - 0.9
  - 0.95
  - 0.99
  calibration_target: 'Minimum event count >= min_events_calibration; prefer higher
    quantile.

    '
  stability_requirement: 'Selected threshold must yield >= min_events_calibration
    events on both in-sample and the most recent 12-month rolling window.

    '
  failure_modes:
  - Fewer than 2 * volume_window bars: no valid median, no events
  - All-zero volume: vol_ratio undefined, skip symbol
  - Single-tick instrument: range_pct near zero, detector disabled
expected_behavior:
  holding_horizon_bars: 1-12
  invalidation_conditions:
  - Volume returns above-median within 1 bar of event end
  - Range compresses below 0.8 * range_med within 2 bars
  false_positive_scenarios:
  - Low-liquidity asset with structurally low volume (always below median)
  - Wide-spread instruments where range_pct baseline is already elevated
  - Post-news window: shock may be informational, not a vacuum
  disabled_regimes:
  - SPREAD_BLOWOUT active: spread already elevated, detector over-fires
  - SCHEDULED_NEWS_WINDOW_EVENT active: directional information event
  expected_overlap:
  - LIQUIDATION_CASCADE: co-occurrence ~15-25%; liquidity withdraws during cascade
  - DEPTH_COLLAPSE: high co-occurrence; both detect thin-book conditions
  - VOL_SHOCK: moderate co-occurrence; may precede or co-occur
trigger: Detector triggers on liquidity vacuum pattern
confirmation: Post-detection price action confirms signal validity
cluster_id: liquidity_stress
identity:
  canonical_regime: LIQUIDITY_STRESS
  subtype: liquidity_vacuum
  phase: collapse
  evidence_mode: direct
  layer: canonical
  disposition: keep
  asset_scope: single_asset
  venue_scope: single_venue
governance:
  event_kind: market_event
  default_executable: false
  research_only: false
  strategy_only: false
  context_tag: true
  is_composite: false
  maturity: ''
  tier: A
  operational_role: context
  deployment_disposition: context_only_execution_guard
  runtime_category: active_runtime_event
  detector_band: context_only
  planning_eligible: true
  runtime_trade_eligible: false
  promotion_eligible: false
  primary_anchor_eligible: false
runtime:
  detector: LiquidityVacuumDetector
  enabled: true
  signal_column: liquidity_vacuum_event
  events_file: liquidity_vacuum_events.parquet
  reports_dir: liquidity_vacuum
  instrument_classes:
  - crypto
  - futures
  requires_features:
  - timestamp
  - close
  - high
  - low
  - depth_usd
  - spread_bps
  sequence_eligible: true
  runtime_tags:
  - liquidity_stress
  - high_urgency
semantics:
  cluster_id: liquidity_stress
  notes: Execution/risk guard. Raw vacuum is not an entry trigger; use LIQUIDITY_VACUUM_RECOVERY.
  precedence_rank: 0
interaction:
  suppresses:
  - event_type: VOL_SHOCK
    penalty_factor: 0.5
    block: false
    reason: Vol signal unreliable during thin-book conditions; vol expansion may be
      noise-driven. Partial penalty.
  suppressed_by: []
routing:
  standalone_trade_eligible: false
