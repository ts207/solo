event_type: OI_FLUSH
synthetic_coverage: covered
reports_dir: oi_shocks
events_file: oi_shock_events.parquet
signal_column: oi_flush_event
parameters:
  oi_window: 96
  spike_z_th: 2.5
  flush_pct_th: -0.02
research_family: POSITIONING_EXTREMES
trigger: Detector triggers on oi flush pattern
confirmation: Post-detection price action confirms signal validity
expected_behavior:
  holding_horizon_bars: 4-24
  invalidation_conditions:
  - Position unwinds within expected horizon
  - Funding reverses sign
  disabled_regimes:
  - 'Low liquidity regime: OI/vol signals unreliable'
cluster_id: oi_dynamic
identity:
  canonical_regime: POSITIONING_UNWIND_DELEVERAGING
  subtype: oi_flush
  phase: unwind
  evidence_mode: direct
  layer: canonical
  disposition: merge
  asset_scope: single_asset
  venue_scope: single_venue
governance:
  event_kind: market_event
  default_executable: false
  research_only: false
  strategy_only: false
  context_tag: false
  is_composite: false
  maturity: ''
  tier: B
  operational_role: trigger
  deployment_disposition: secondary_or_confirm_no_liquidation
  runtime_category: active_runtime_event
  detector_band: research_trigger
  planning_eligible: true
  runtime_trade_eligible: true
  promotion_eligible: false
  primary_anchor_eligible: false
runtime:
  detector: OIFlushDetectorV2
  enabled: true
  signal_column: oi_flush_event
  events_file: oi_shock_events.parquet
  reports_dir: oi_shocks
  instrument_classes:
  - crypto
  - futures
  requires_features:
  - timestamp
  - oi_notional
  - close
  sequence_eligible: true
  runtime_tags:
  - oi_dynamic
  - high_urgency
  derives_features:
  - ms_oi_state
  - ms_oi_confidence
  - ms_oi_entropy
semantics:
  cluster_id: oi_dynamic
  notes: No-liquidation forced-flow proxy; requires pairing before trade routing.
  precedence_rank: 0
interaction:
  suppresses: []
  suppressed_by: []
routing:
  standalone_trade_eligible: false
detector:
  signal_definition: 'No-liquidation forced-flow proxy: sharp OI contraction during
    a directional price move. ms_oi_state is quality/context, not a hard trigger gate.'
  required_columns:
  - timestamp
  - oi_notional
  - close
  optional_columns:
  - ms_oi_state
  - ms_oi_confidence
  - ms_oi_entropy
  - failed_continuation
  - liquidity_vacuum_recovery
  - vol_shock
  formula: 'core_flush[i] = oi_pct_change[i] <= flush_pct_th AND abs(close_ret[i])
    >= price_move_threshold_bps/10000

    quality = ok when ms_oi_state confirms contraction, degraded otherwise

    trade_eligible = paired_context_present AND not standalone'
