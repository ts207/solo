version: 1
kind: event_data_quality_contract
metadata:
  status: authored

defaults:
  min_coverage: 0.98
  max_stale_bars: 1
  synthetic_allowed: false

hard_blocks:
  - state: DATA_STALE_STATE
    block_all_trade_templates: true
  - state: MISSING_REQUIRED_FEATURE_STATE
    block_all_trade_templates: true
  - state: SYNTHETIC_ONLY_STATE
    research_only: true

required_fields:
  - required_features
  - data_quality.min_coverage
  - data_quality.max_stale_bars
  - data_quality.synthetic_allowed
