version: 1
kind: search_spec
metadata:
  phase: benchmark
  description: Narrow maintained benchmark search spec for POSITIONING_EXTREMES (DELEVERAGING_WAVE)
    context comparison.
search_mode: subset
triggers:
  events:
  - DELEVERAGING_WAVE
contexts:
  vol_regime:
  - high
  - normal
horizons:
- 15m
directions:
- long
- short
entry_lag:
- 1
cost_profiles:
- standard
expression_templates:
- mean_reversion
template_policy:
  generic_templates_allowed: true
  reason: "Incumbent benchmark template"
