version: 1
kind: search_spec
metadata:
  phase: benchmark
  description: Maintained FALSE_BREAKOUT quality-boundary benchmark spec. Intended
    for context-quality demotion checks.
search_mode: subset
triggers:
  events:
  - FALSE_BREAKOUT
contexts:
  vol_regime: high
horizons:
- 15m
directions:
- long
- short
entry_lag:
- 1
cost_profiles:
- standard
expression_templates:
- mean_reversion
- breakout_followthrough
- pullback_entry
filter_templates:
- only_if_trend
template_policy:
  generic_templates_allowed: true
  reason: legacy_disabled_research_surface
