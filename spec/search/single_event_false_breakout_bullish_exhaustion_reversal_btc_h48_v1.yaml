version: 1
kind: search_space
metadata:
  phase: trend_failure_false_breakout_bullish_validation
  description: Bounded BTCUSDT reproduction branch for FALSE_BREAKOUT exhaustion reversal under bullish trend state.
  search_tier: single_event_context
  default_symbols:
  - BTCUSDT
triggers:
  events:
  - FALSE_BREAKOUT
horizons:
- 48b
directions:
- long
entry_lag: 1
cost_profiles:
- standard
expression_templates:
- exhaustion_reversal
filter_templates: []
execution_templates: []
include_sequences: false
include_interactions: false
contexts:
  ms_trend_state:
  - bullish
discovery_search:
  mode: flat
  trigger_viability:
    enabled: true
    max_templates: 1
    max_horizons: 1
    max_entry_lags: 1
    allow_both_directions: false
    top_k_triggers: null
    min_stage_score: 0.0
  template_refinement:
    enabled: false
    top_k_templates_per_trigger: 1
    min_stage_score: 0.0
  execution_refinement:
    enabled: false
    top_k_shapes_per_template: 1
    min_stage_score: 0.0
  context_refinement:
    enabled: false
    max_context_dims: 1
    top_k_contexts_per_candidate: 1
    require_unconditional_baseline: true
    min_context_gain: 0.0
discovery_selection:
  mode: "off"
template_policy:
  generic_templates_allowed: true
  reason: legacy_edge_cell_reproduction_exact_template
