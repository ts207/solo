version: 1
kind: search_space
metadata:
  phase: funding_continuation_forward_falsification
  description: "Bounded BTCUSDT funding-persistence plus OI-confirmation forward check."
  search_tier: sequence_confirmation
  default_symbols:
    - BTCUSDT
triggers:
  events:
    - FUNDING_PERSISTENCE_TRIGGER
    - OI_SPIKE_POSITIVE
horizons:
  - 48b
directions:
  - long
entry_lag: 1
cost_profiles:
  - standard
expression_templates:
  - continuation
filter_templates: []
execution_templates: []
include_sequences: true
include_interactions: false

discovery_search:
  mode: flat

  trigger_viability:
    enabled: true
    max_templates: 1
    max_horizons: 1
    max_entry_lags: 1
    allow_both_directions: false
    top_k_triggers: null
    min_stage_score: 0.0

  template_refinement:
    enabled: false
    top_k_templates_per_trigger: 1
    min_stage_score: 0.0

  execution_refinement:
    enabled: false
    top_k_shapes_per_template: 1
    min_stage_score: 0.0

  context_refinement:
    enabled: false
    max_context_dims: 0
    top_k_contexts_per_candidate: 0
    require_unconditional_baseline: true
    min_context_gain: 0.0

discovery_selection:
  mode: "off"
