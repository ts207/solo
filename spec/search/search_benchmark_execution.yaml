version: 1
kind: search_spec
metadata:
  phase: benchmark
  description: Narrow maintained benchmark search spec for EXECUTION_FRICTION (SPREAD_BLOWOUT)
    context comparison.
search_mode: subset
triggers:
  events:
  - SPREAD_BLOWOUT
contexts:
  vol_regime:
  - high
  - normal
horizons:
- 15m
directions:
- long
- short
entry_lag:
- 1
cost_profiles:
- standard
expression_templates:
- mean_reversion
template_policy:
  generic_templates_allowed: true
  reason: "Benchmark spec intentionally uses the abstract mean_reversion family for compatibility/regression coverage; not a promotion search surface."
