version: 1
kind: template_registry
metadata:
  status: generated
  authored_source: spec/templates/registry.yaml
defaults:
  templates:
  - mean_reversion
  - continuation
  - trend_continuation
  - pullback_entry
  horizons:
  - 5m
  - 15m
  - 60m
  conditioning_cols:
  - vol_regime
  - carry_state
  - funding_bps
  - ms_trend_state
  - ms_spread_state
  - severity_bucket
  param_grids:
    common:
      entry_lag_bars:
      - 1
      - 2
      - 3
      horizon_bars:
      - 6
      - 12
      - 24
      - 48
      cooldown_bars:
      - 6
      - 12
      - 24
    risk:
      stop_loss_bps:
      - 20
      - 40
      - 80
      take_profit_bps:
      - 20
      - 40
      - 80
      - 160
      stop_loss_atr_multipliers:
      - 1.0
      - 2.0
      - 3.0
      take_profit_atr_multipliers:
      - 1.5
      - 3.0
      - 5.0
families:
  BASIS_FUNDING_DISLOCATION:
    allowed_templates:
    - reversal_or_squeeze
    - mean_reversion
    - continuation
    - exhaustion_reversal
    - convexity_capture
    - only_if_funding
    - only_if_oi
    - only_if_regime
    - only_if_highvol
    - only_if_trend
    - tail_risk_avoid
  EXECUTION_FRICTION:
    allowed_templates:
    - slippage_aware_filter
    - tail_risk_avoid
  FORCED_FLOW_AND_EXHAUSTION:
    allowed_templates:
    - mean_reversion
    - exhaustion_reversal
    - momentum_fade
    - range_reversion
    - only_if_trend
    - only_if_regime
    - drawdown_filter
  INFORMATION_DESYNC:
    allowed_templates:
    - desync_repair
    - convergence
    - basis_repair
    - lead_lag_follow
    - divergence_continuation
  LIQUIDITY_DISLOCATION:
    allowed_templates:
    - mean_reversion
    - continuation
    - stop_run_repair
    - overshoot_repair
    - only_if_liquidity
    - slippage_aware_filter
  LIQUIDITY_STRESS:
    allowed_templates:
    - mean_reversion
    - continuation
    - stop_run_repair
    - overshoot_repair
    - only_if_liquidity
    - slippage_aware_filter
    - only_if_regime
    - only_if_highvol
  POSITIONING_EXTREMES:
    allowed_templates:
    - carry_continuation_confirmed
    - squeeze_followthrough_confirmed
    - reversal_or_squeeze
    - mean_reversion
    - continuation
    - exhaustion_reversal
    - convexity_capture
    - only_if_funding
    - only_if_oi
    - tail_risk_avoid
  POSITIONING_UNWIND_DELEVERAGING:
    allowed_templates:
    - reversal_or_squeeze
    - mean_reversion
    - continuation
    - exhaustion_reversal
    - convexity_capture
    - only_if_funding
    - only_if_oi
    - only_if_regime
    - tail_risk_avoid
  REGIME_TRANSITION:
    allowed_templates:
    - only_if_regime
    - continuation
    - mean_reversion
    - drawdown_filter
    - tail_risk_avoid
  STATISTICAL_DISLOCATION:
    allowed_templates:
    - mean_reversion
    - overshoot_repair
    - tail_risk_avoid
  TEMPORAL_STRUCTURE:
    allowed_templates:
    - mean_reversion
    - continuation
    - tail_risk_avoid
    - only_if_no_news_window
  TREND_FAILURE_EXHAUSTION:
    allowed_templates:
    - mean_reversion
    - exhaustion_reversal
    - momentum_fade
    - range_reversion
    - only_if_trend
    - only_if_regime
    - only_if_highvol
    - drawdown_filter
  TREND_STRUCTURE:
    allowed_templates:
    - breakout_followthrough
    - false_breakout_reversal
    - pullback_entry
    - trend_continuation
    - continuation
    - only_if_trend
  VOLATILITY_TRANSITION:
    allowed_templates:
    - mean_reversion
    - continuation
    - trend_continuation
    - volatility_expansion_follow
    - pullback_entry
    - only_if_regime
filter_templates:
  only_if_funding:
    feature: funding_rate
    operator: '>'
    threshold: 0.0
  only_if_oi:
    feature: oi_delta_1h
    operator: '>'
    threshold: 0.0
  only_if_liquidity:
    feature: liquidation_count
    operator: '>'
    threshold: 0.0
  slippage_aware_filter:
    feature: spread_zscore
    operator: '>'
    threshold: 1.0
  tail_risk_avoid:
    feature: rv_pct_17280
    operator: <
    threshold: 0.9
  drawdown_filter:
    feature: logret_1
    operator: <
    threshold: -0.002
  only_if_regime:
    feature: rv_pct_17280
    operator: '>'
    threshold: 0.7
  only_if_highvol:
    feature: rv_pct_17280
    operator: '>'
    threshold: 0.85
  only_if_trend:
    feature: logret_1
    operator: '>'
    threshold: 0.001
  only_if_no_news_window:
    feature: calendar_event
    operator: ==
    threshold: 0
