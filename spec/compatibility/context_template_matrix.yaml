version: 1
kind: context_template_matrix
metadata:
  status: authored

context_template_matrix:
  liquidity_phase:
    vacuum:
      forbidden_templates:
        - generic_continuation
        - unconditioned_mean_reversion
      penalty_factor: 0.25
    refill:
      enables_templates:
        - liquidity_refill_repair
        - forced_flow_rebound

  execution_friction:
    blocked:
      block_all_trade_templates: true
    severe:
      forbidden_templates:
        - basis_convergence
        - generic_continuation

  forced_flow_phase:
    reacceleration:
      forbidden_templates:
        - forced_flow_rebound
        - liquidity_refill_repair

  temporal_phase:
    pre_news:
      forbidden_templates:
        - statistical_mean_reversion
        - funding_reset_reversion

  data_quality_state:
    stale:
      block_all_trade_templates: true
    missing_required_feature:
      block_all_trade_templates: true
    synthetic_only:
      research_only: true
