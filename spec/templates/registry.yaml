version: 2
kind: event_template_registry
metadata:
  status: authoritative
  generated_views:
  - spec/templates/event_template_registry.yaml
  - spec/ontology/templates/template_registry.yaml
  - project/configs/registries/templates.yaml
  legacy_specs_read_only:
  - spec/multiplicity/families.yaml
  - spec/multiplicity/taxonomy.yaml
  notes: Canonical authored template source. Generated runtime and ontology template
    registries are rebuilt from this file. Event rows use research_family as the
    coarse search/template grouping key; canonical_family is generated only for
    compatibility sidecars.
  phase2_search_unit: trigger_x_expression_template
  template_kind_policy: Expression templates are the primary search unit. Filter templates
    are optional overlays. Execution-template-only search branches are reserved and
    must not be emitted as standalone hypotheses.
defaults:
  templates:
  - mean_reversion
  - continuation
  - trend_continuation
  - pullback_entry
  horizons:
  - 5m
  - 15m
  - 60m
  conditioning_cols:
  - vol_regime
  - carry_state
  - funding_bps
  - ms_trend_state
  - ms_spread_state
  - severity_bucket
  max_candidates_per_run: 1000
  template_param_grid_defaults:
    common:
      entry_lag_bars:
      - 1
      - 2
      - 3
      horizon_bars:
      - 6
      - 12
      - 24
      - 48
      cooldown_bars:
      - 6
      - 12
      - 24
    risk:
      stop_loss_bps:
      - 20
      - 40
      - 80
      take_profit_bps:
      - 20
      - 40
      - 80
      - 160
      stop_loss_atr_multipliers:
      - 1.0
      - 2.0
      - 3.0
      take_profit_atr_multipliers:
      - 1.5
      - 3.0
      - 5.0
families:
  LIQUIDITY_STRESS:
    templates:
    - mean_reversion
    - continuation
    - stop_run_repair
    - overshoot_repair
