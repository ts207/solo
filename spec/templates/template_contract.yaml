version: 1
kind: template_contract
metadata:
  status: authored
  purpose: >
    Expression templates must define distinct tradable logic. Generic names are
    abstract families and should not be used as promotion-path evidence.

template_kinds:
  expression:
    standalone_alpha: true
  repair_expression:
    standalone_alpha: true
  filter:
    standalone_alpha: false
  execution_policy:
    standalone_alpha: false

required_expression_fields:
  - side_policy
  - entry
  - exit
  - labels.primary
  - labels.success_condition
  - required_contexts
  - forbidden_contexts
  - risk.sizing_profile
  - risk.cost_model

plan_time_rules:
  - id: filter_only_templates_not_standalone
    rule: if template.kind in [filter, execution_policy] and no expression_template, fail
  - id: semantic_branch_distinctness
    branch_hash_fields:
      - event_type
      - event_filter
      - context_filter
      - side_policy
      - entry_delay
      - horizon
      - target_label
      - cost_model

generic_template_replacements:
  mean_reversion:
    - range_reversion
    - basis_convergence
    - vol_decay_mean_reversion
    - liquidity_refill_repair
  continuation:
    - trend_followthrough
    - carry_continuation_confirmed
    - vol_expansion_followthrough
  exhaustion_reversal:
    - forced_flow_rebound
    - trend_exhaustion_fade
    - long_flush_rebound
  reversal_or_squeeze:
    - carry_unwind_reversal
    - short_squeeze_followthrough
    - long_squeeze_followthrough
  convexity_capture:
    - mfe_capture_after_positioning_shock
