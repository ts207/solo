feature_family: session_features
version: 1.0.0
base_timeframe: 1m
inputs:
  - dataset: perp_ohlcv_1m
    columns: [high, low, close, volume]
features:
  - name: session_range_pct
    description: Percentile rank of the current session trading range
    formula: rank(session_hi - session_lo) / count(session_hi - session_lo)
    params: {window: 60}
  - name: session_vol_z
    description: Volume z-score conditioned on session hour
    formula: (volume - mean(volume_at_hour)) / std(volume_at_hour)
provenance:
  pit_constraint: "asof <= t0"
