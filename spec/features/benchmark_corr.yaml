feature_family: correlation
version: 1.0.0
base_timeframe: 1m
inputs:
  - dataset: perp_ohlcv_1m
    columns: [close]
  - dataset: benchmark_ohlcv_1m
    columns: [close]
features:
  - name: benchmark_corr
    description: "Rolling correlation with benchmark asset."
    formula: "corr(returns(close), returns(benchmark_close), window)"
    params: {window: 96}
provenance:
  source_id: "synthetic"
  claim_id: []
  pit_constraint: "asof <= t0"
