horizons:
  - 12b
  - 24b
  - 48b
directions:
  - long
  - short
entry_lag: 1
cost_profiles:
  - standard
template_policy:
  generic_templates_allowed: true
  reason: broad discovery surface intentionally uses generic templates; concrete templates added via event-scoped narrowing
expression_templates:
  - mean_reversion
  - continuation
  - trend_continuation
  - exhaustion_reversal
  - momentum_fade
  - pullback_entry
  - overshoot_repair
filter_templates: []
execution_templates: []
include_sequences: false
include_interactions: false

# Discovery Search Strategy — [STATUS: STABLE]
# Benchmark mode D is the canonical operator path:
# hierarchical search + v2 scoring + repeated walk-forward folds.
# Ledger adjustment and diversified shortlist are disabled for this path.
discovery_search:
  mode: hierarchical   # "hierarchical" (STABLE) | "flat" (legacy fallback)

  trigger_viability:
    enabled: true
    max_templates: 1           # One canonical probe template per trigger
    max_horizons: 1            # First horizon in list only
    max_entry_lags: 1          # First entry lag only
    allow_both_directions: true
    top_k_triggers: null       # null = all viable triggers advance
    min_stage_score: 0.0

  template_refinement:
    enabled: true
    top_k_templates_per_trigger: 3
    min_stage_score: 0.0

  execution_refinement:
    enabled: true
    top_k_shapes_per_template: 3
    min_stage_score: 0.0

  context_refinement:
    enabled: true
    max_context_dims: 1        # Hard cap: no conjunctions in v1
    top_k_contexts_per_candidate: 2
    require_unconditional_baseline: true
    min_context_gain: 0.0      # Context must not hurt baseline score

# Phase 5 — Portfolio-aware discovery selection
# Diversified shortlist remains opt-in. Mode D disables selection overlays so
# canonical discovery reports the artifact-backed final candidate set directly.
discovery_selection:
  mode: "off"   # single canonical path: no selection overlay

  overlap:
    enabled: true
    structural_weight: 0.5
    fold_weight: 0.3
    lineage_weight: 0.2
    edge_threshold: 0.65   # Minimum similarity to draw an overlap graph edge

  shortlist:
    enabled: false
    size: 20
    lambda_quality: 0.7
    lambda_overlap: 0.2
    lambda_crowding: 0.1
    max_per_overlap_cluster: 2
    max_per_trigger_family: 3
    max_per_lineage: 2
