version: edge_cells_v2
context_cells:
  - id: high_vol
    dimension: vol_regime
    values: [high]
    required_feature_key: high_vol_regime
    executability_class: runtime
    max_conjunction_depth: 1
  - id: low_vol
    dimension: vol_regime
    values: [low]
    required_feature_key: low_vol_regime
    executability_class: runtime
    max_conjunction_depth: 1
  - id: positive_funding
    dimension: carry_state
    values: [funding_pos]
    required_feature_key: carry_state
    executability_class: supportive_only
    supportive_context:
      canonical_regime: BASIS_FUNDING_DISLOCATION
      support_dimension: carry_state
      support_values: [funding_pos]
    max_conjunction_depth: 1
  - id: negative_funding
    dimension: carry_state
    values: [funding_neg]
    required_feature_key: carry_state
    executability_class: supportive_only
    supportive_context:
      canonical_regime: BASIS_FUNDING_DISLOCATION
      support_dimension: carry_state
      support_values: [funding_neg]
    max_conjunction_depth: 1
  - id: crowded_funding
    dimension: funding_regime
    values: [crowded]
    required_feature_key: crowding_state
    executability_class: supportive_only
    max_conjunction_depth: 1
  - id: bullish_trend
    dimension: ms_trend_state
    values: [bullish]
    required_feature_key: ms_trend_state
    executability_class: runtime
    max_conjunction_depth: 1
  - id: bearish_trend
    dimension: ms_trend_state
    values: [bearish]
    required_feature_key: ms_trend_state
    executability_class: runtime
    max_conjunction_depth: 1
  - id: chop
    dimension: ms_trend_state
    values: [chop]
    required_feature_key: ms_trend_state
    executability_class: runtime
    max_conjunction_depth: 1
  - id: wide_spread
    dimension: ms_spread_state
    values: [wide]
    required_feature_key: ms_spread_state
    executability_class: runtime
    max_conjunction_depth: 1
  - id: low_liquidity
    dimension: liquidity_regime
    values: [low]
    required_feature_key: low_liquidity_state
    executability_class: supportive_only
    max_conjunction_depth: 1
