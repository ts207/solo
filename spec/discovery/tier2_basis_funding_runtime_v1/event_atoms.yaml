version: edge_cells_v2
event_atoms:
  - id: funding_flip_basis_runtime
    event_family: basis_funding
    event_type: FUNDING_FLIP
    directions: [long, short]
    templates: [mean_reversion, reversal_or_squeeze, continuation]
    horizons: [12b, 24b, 48b]
    required_feature_keys: [funding_rate_bps]
    thesis_eligible: false
    research_only: false
  - id: fnd_disloc_basis_runtime
    event_family: basis_funding
    event_type: FND_DISLOC
    directions: [long, short]
    templates: [mean_reversion, overshoot_repair, tail_risk_avoid]
