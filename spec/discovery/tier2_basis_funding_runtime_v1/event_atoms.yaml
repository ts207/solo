    directions: [long, short]
    templates: [mean_reversion, overshoot_repair, tail_risk_avoid]
    horizons: [12b, 24b, 48b]
    required_feature_keys: [close]
    thesis_eligible: false
    research_only: false
  - id: spot_perp_basis_shock_runtime
    event_family: basis_funding
    event_type: SPOT_PERP_BASIS_SHOCK
    directions: [long, short]
