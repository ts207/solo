gate_e1:
  min_prevalence_10k: 1.0
  max_prevalence_10k: 500.0
  min_join_rate: 0.99
  max_clustering_5b: 0.20
gate_v1_phase2:
  q_value_mechanism_column: q_value_mechanism  # Operative FDR gate (mechanism-group BH)
  min_t_stat: 2.0       # gross diagnostic; phase-2 hard gate uses min_t_stat_net
  min_t_stat_net: 2.0
  min_mean_return_net_bps: 0.0
  use_net_gate: true
  max_q_value: 0.05
  min_after_cost_expectancy_bps: 0.1
  conservative_cost_multiplier: 1.5
  require_sign_stability: true
  min_sample_size: 50
  # Regime-stratified ESS gate (HP-102).
  regime_ess_min_per_regime: 1.0
  regime_ess_min_regimes: 3
  # Multi-timeframe expectancy consensus gate (HP-104).
  timeframe_consensus_timeframes: ["1m", "5m", "15m"]
  timeframe_consensus_min_ratio: 0.0
  timeframe_consensus_min_timeframes: 2
  # Multiplicity diagnostics (HP-103).
  multiplicity_enable_cluster_adjusted: true
  multiplicity_cluster_threshold: 0.85
  multiplicity_enable_by_diagnostic: true
  # Hard floor for conditioned-bucket candidate stats (e.g., severity_bucket_extreme_5pct).
  conditioned_bucket_hard_floor: 75
  # Optional explicit override (audited in phase2 report + generation diagnostics).
  conditioned_bucket_min_samples_override: null
  # Lowering the conditioned bucket floor is only honored in research mode when true.
  allow_conditioned_bucket_floor_override: false
  # Quality floors controlling compile eligibility
  # strict: required for discovery-track promotion; fallback: exploratory non-discovery compile
  quality_floor_strict: 0.66
  quality_floor_fallback: 0.66
  min_events_fallback: 100

# Confirmatory promotion criteria (P3)
promotion_confirmatory_gates:
  deployable:
    q_value_mechanism_column: q_value_mechanism
    max_q_value: 0.05
    min_oos_ess: 50
    min_oos_event_count: 50
    require_independent_test_significance: true
    max_posterior_error: 0.02
    cost_stress_multiplier: 2.0
    latency_stress_bars: 2
    max_overlap_concentration: 0.50
    # G1: Regime thresholds
    min_regimes_supported: 3
    min_ess_per_regime: 20
    require_regime_stability: true
  shadow:
    q_value_mechanism_column: q_value_mechanism
    max_q_value: 1.0
    min_oos_ess: 0
    min_oos_event_count: 0
    require_sign_consistency: false
    cost_stress_multiplier: 1.0
    latency_stress_bars: 1
    # G1: Shadow regime thresholds
    min_regimes_supported: 0
    min_ess_per_regime: 0

# Promotion modes (G1)
promotion_modes:
  regime_specific:
    allowed_for: ["shadow", "deployable"]
    requirements: ["explicit_regime_filter_in_blueprint"]
  regime_general:
    allowed_for: ["deployable"]
    requirements: ["stability_across_major_regimes", "min_regimes_supported >= 2"]

# Profiled phase2 overrides.
# - discovery: high-recall research tuning
# - promotion: strict defaults for production/certification
gate_v1_phase2_profiles:
  discovery:
    q_value_mechanism_column: q_value_mechanism
    max_q_value: 0.15
    min_after_cost_expectancy_bps: -0.5
    conservative_cost_multiplier: 1.1
    require_sign_stability: false
    regime_ess_min_regimes: 1
    timeframe_consensus_min_timeframes: 1
    event_overrides:
      OI_SPIKE_NEGATIVE:
        min_after_cost_expectancy_bps: -1.0
        conservative_cost_multiplier: 1.0
      OI_SPIKE_POSITIVE:
        max_q_value: 0.20
        min_after_cost_expectancy_bps: -1.0
        conservative_cost_multiplier: 1.0
      LIQUIDATION_CASCADE:
        max_q_value: 0.20
        min_after_cost_expectancy_bps: -5.0
        conservative_cost_multiplier: 1.0
      LIQUIDITY_VACUUM:
        max_q_value: 0.20
        min_after_cost_expectancy_bps: -5.0
        conservative_cost_multiplier: 1.0
        require_sign_stability: false
  promotion:
    regime_ess_min_regimes: 2
    event_overrides: {}
  synthetic:
    min_t_stat: 1.0
    min_t_stat_net: 1.0
    min_mean_return_net_bps: -2.0
    max_q_value: 0.35
    min_after_cost_expectancy_bps: -2.0
    conservative_cost_multiplier: 1.0
    require_sign_stability: false
    min_sample_size: 8
    conditioned_bucket_hard_floor: 8
    allow_conditioned_bucket_floor_override: true
    quality_floor_fallback: 0.0
    min_events_fallback: 8
    event_overrides:
      CROSS_VENUE_DESYNC:
        max_q_value: 0.40
      BASIS_DISLOC:
        max_q_value: 0.40
      FND_DISLOC:
        max_q_value: 0.40
      TREND_EXHAUSTION_TRIGGER:
        max_q_value: 0.40
      MOMENTUM_DIVERGENCE_TRIGGER:
        max_q_value: 0.40

gate_v1_fallback:
  min_t_stat: 2.5
  min_after_cost_expectancy_bps: 1.0
  min_sample_size: 100
  min_stability_score: 0.7
  promotion_eligible_regardless_of_fdr: false

gate_v1_bridge:
  edge_cost_k: 2.0
  stressed_cost_multiplier: 1.5
  min_validation_trades: 10
  search_bridge_min_t_stat: 0.0
  search_bridge_min_robustness_score: 0.5
  search_bridge_min_regime_stability_score: 0.4
  search_bridge_min_stress_survival: 0.0
  search_bridge_stress_cost_buffer_bps: 0.0
  # Microstructure risk controls (HP-106).
  micro_max_spread_stress: 2.0
  micro_max_depth_depletion: 0.70
  micro_max_sweep_pressure: 2.5
  micro_max_abs_imbalance: 0.90
  micro_min_feature_coverage: 0.25
  dynamic_cost_adjustment:
    LIQUIDITY_DISLOCATION:
      multiplier: "spread_pct_at_event / median_spread_pct"
      target: "slippage_bps_per_fill"


shrinkage_parameters:
  # Direction semantics are resolved from template_verb_lexicon side_policy.
  # Keep shrinkage_parameters focused on decay and pooling controls.
  tau_by_family_days:
    LIQUIDITY_DISLOCATION: 15.0
    VOLATILITY_TRANSITION: 30.0
    POSITIONING_EXTREMES: 60.0
    FORCED_FLOW_AND_EXHAUSTION: 90.0
    TREND_STRUCTURE: 90.0
    STATISTICAL_DISLOCATION: 30.0
    REGIME_TRANSITION: 180.0
    INFORMATION_DESYNC: 60.0
    TEMPORAL_STRUCTURE: 30.0
    EXECUTION_FRICTION: 20.0
  vol_regime_multiplier:
    LOW: 1.4
    MID: 1.0
    HIGH: 0.7
    SHOCK: 0.4
  liquidity_state_multiplier:
    LOW: 0.6
    NORMAL: 1.0
    RECOVERY: 1.2
  directional_asymmetry_by_family:
    LIQUIDITY_DISLOCATION: [1.1, 0.5]
    VOLATILITY_TRANSITION: [1.0, 0.9]
    POSITIONING_EXTREMES: [1.4, 0.7]
    FORCED_FLOW_AND_EXHAUSTION: [1.2, 0.8]
    TREND_STRUCTURE: [1.6, 0.8]
    REGIME_TRANSITION: [1.2, 0.8]
