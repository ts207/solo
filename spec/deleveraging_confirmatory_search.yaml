version: 1
kind: search_space
metadata:
  phase: confirmatory
  description: Confirmatory search for DELEVERAGING_WAVE, MOMENTUM_DIVERGENCE_TRIGGER, BAND_BREAK survivors
  search_tier: confirmatory
  default_symbols:
    - BTCUSDT
triggers:
  events:
    - DELEVERAGING_WAVE
    - MOMENTUM_DIVERGENCE_TRIGGER
    - BAND_BREAK
horizons:
  - 12b
  - 24b
directions:
  - long
  - short
entry_lag: 1
cost_profiles:
  - standard
expression_templates:
  - mean_reversion
  - exhaustion_reversal
  - momentum_fade
  - overshoot_repair
filter_templates: []
execution_templates: []
include_sequences: false
include_interactions: false

discovery_search:
  mode: flat

  trigger_viability:
    enabled: true
    max_templates: 1
    max_horizons: 1
    max_entry_lags: 1
    allow_both_directions: true
    top_k_triggers: null
    min_stage_score: 0.0

  template_refinement:
    enabled: true
    top_k_templates_per_trigger: 3
    min_stage_score: 0.0

  execution_refinement:
    enabled: true
    top_k_shapes_per_template: 3
    min_stage_score: 0.0

  context_refinement:
    enabled: true
    max_context_dims: 1
    top_k_contexts_per_candidate: 2
    require_unconditional_baseline: true
    min_context_gain: 0.0

discovery_selection:
  mode: greedy

  overlap:
    enabled: true
    structural_weight: 0.5
    fold_weight: 0.3
    lineage_weight: 0.2
    edge_threshold: 0.65

  shortlist:
    enabled: true
    size: 10
    lambda_quality: 0.7
    lambda_overlap: 0.2
    lambda_crowding: 0.1
    max_per_overlap_cluster: 1
    max_per_trigger_family: 2
    max_per_lineage: 1