default_profile: no_liquidations_v1
profiles:
  no_liquidations_v1:
    description: Runtime profile for OHLCV + funding + OI + spread/depth, without liquidation feed.
    available_feeds: {ohlcv: true, funding: true, open_interest: true, spread_bps: true, depth_usd: true, liquidations: false}
    disabled_detectors: [LIQUIDATION_CASCADE, LIQUIDATION_CASCADE_PROXY, LIQUIDATION_EXHAUSTION_REVERSAL, FORCED_FLOW_EXHAUSTION, FORCED_FLOW_REVERSAL, LONG_STRESS_REVERSAL]
    runtime_detectable_detectors: [OI_EXPANSION_STRESS, OI_SPIKE_NEGATIVE, OI_FLUSH, LIQUIDITY_VACUUM, LIQUIDITY_VACUUM_RECOVERY, FUNDING_EXTREME_ONSET, FUNDING_POS_EXTREME_ONSET, FUNDING_NEG_EXTREME_ONSET, VOL_SHOCK, VOL_SPIKE, FAILED_CONTINUATION]
    context_only_detectors: [OI_SPIKE_NEGATIVE, OI_EXPANSION_STRESS, FUNDING_EXTREME_ONSET, FUNDING_POS_EXTREME_ONSET, FUNDING_NEG_EXTREME_ONSET, LIQUIDITY_VACUUM, SLIPPAGE_SPIKE_EVENT, WICK_REVERSAL_PROXY]
    never_trade_standalone: [OI_SPIKE_NEGATIVE, OI_EXPANSION_STRESS, FUNDING_EXTREME_ONSET, FUNDING_POS_EXTREME_ONSET, FUNDING_NEG_EXTREME_ONSET, LIQUIDITY_VACUUM, SLIPPAGE_SPIKE_EVENT, WICK_REVERSAL_PROXY]
    trade_candidate_events: [OI_FLUSH_REVERSAL, FUNDING_CROWDING_BREAK, SHORT_BUILD_CONTINUATION, SQUEEZE_RISK_REVERSAL]
    paper_approved_events: []
    live_approved_events: []
    research_only_events:
      - FUNDING_CROWDING_BREAK
      - OI_FLUSH_REVERSAL
      - OI_FLUSH_REVERSAL_NO_BOOK_RESEARCH
      - OI_FLUSH_DOWN_REVERSAL_STRICT
      - OI_FLUSH_DOWN_CONTINUATION_STRICT
      - OI_FLUSH_UP_REVERSAL_STRICT
      - OI_FLUSH_UP_CONTINUATION_STRICT
      - FUNDING_POS_CONTINUATION_STRICT
      - FUNDING_NEG_CONTINUATION_STRICT
      - FUNDING_POS_BREAK_STRICT
      - FUNDING_NEG_BREAK_STRICT
      - LONG_BUILD_CONTINUATION_STRICT
      - SHORT_SQUEEZE_SETUP_STRICT
      - LONG_SQUEEZE_SETUP_STRICT
      - FAILED_BREAKDOWN_RECLAIM
      - FAILED_BREAKOUT_REJECTION
    killed_events: [SQUEEZE_RISK_REVERSAL]
    rejected_events:
      - FUNDING_CROWDING_BREAK_H96_ETHUSDT
      - SQUEEZE_RISK_REVERSAL
      - SHORT_BUILD_CONTINUATION_STRICT_GENERIC_5M
      - MTF_SHORT_BUILD_BREAKDOWN_CONTINUATION_GENERIC
      - MTF_SHORT_BUILD_HIGH_VOL_DOWNTREND
    frozen_families:
      SHORT_BUILD_CONTINUATION:
        status: rejected
        reason: failed alt expansion, MTF, regime lab, walk-forward
        require_material_change_any_of:
          - new execution data
          - new exchange/universe
          - new timeframe above 4h
          - direct liquidation data
    research_candidate_variants:
      FUNDING_CROWDING_BREAK_H96_ETHUSDT:
        event_id: FUNDING_CROWDING_BREAK_H96_ETHUSDT
        base_event: FUNDING_CROWDING_BREAK
        symbol_scope: [ETHUSDT]
        horizon_bars: 96
        bar_interval: 5m
        direction: configured
        cost_round_trip_bps: 6
        status: rejected_fresh_validation
        requires_fresh_validation: false
        fresh_validation_passed: false
        rejection_reason: cost_survival_below_0_8_on_2025_holdout
        validation_artifacts:
          - data/reports/detectors/no_liquidations_v1/variant_validation_eth_2022_2024_to_2025.json
          - data/reports/detectors/no_liquidations_v1/variant_validation_btc_eth_2022_2024_to_2025.json
          - data/reports/detectors/no_liquidations_v1/validation_2025_ethusdt_shadow_report.json
        paper_approved: false
        live_approved: false
    requires_pairing:
      FUNDING_EXTREME_ONSET: {any_of: [OI_EXPANSION_STRESS, OI_FLUSH, VOL_SHOCK, FAILED_CONTINUATION]}
      FUNDING_POS_EXTREME_ONSET: {any_of: [OI_EXPANSION_STRESS, OI_FLUSH, VOL_SHOCK, FAILED_CONTINUATION]}
      FUNDING_NEG_EXTREME_ONSET: {any_of: [OI_EXPANSION_STRESS, OI_FLUSH, VOL_SHOCK, FAILED_CONTINUATION]}
      OI_SPIKE_NEGATIVE: {any_of: [FUNDING_EXTREME_ONSET, VOL_SHOCK, FAILED_CONTINUATION, LIQUIDITY_VACUUM_RECOVERY]}
      OI_EXPANSION_STRESS: {any_of: [FUNDING_EXTREME_ONSET, VOL_SHOCK, FAILED_CONTINUATION, LIQUIDITY_VACUUM_RECOVERY]}
    composite_theses:
      FUNDING_CROWDING_BREAK:
        required_any: [[FUNDING_POS_EXTREME_ONSET, FUNDING_NEG_EXTREME_ONSET, FUNDING_EXTREME_ONSET]]
        confirm_any: [[OI_EXPANSION_STRESS, OI_FLUSH], [VOL_SHOCK, FAILED_CONTINUATION]]
        execution_filter: no_active_liquidity_vacuum
      OI_FLUSH_REVERSAL:
        required_all: [OI_FLUSH, FAILED_CONTINUATION, LIQUIDITY_VACUUM_RECOVERY]
        requires_feeds: [depth_usd, spread_bps]
      SHORT_BUILD_CONTINUATION:
        required_all: [OI_EXPANSION_STRESS]
        required_subtype: short_build_continuation
        confirm_any: [[VOL_SHOCK, FUNDING_NEG_EXTREME_ONSET]]
        execution_filter: no_active_liquidity_vacuum
      SQUEEZE_RISK_REVERSAL:
        required_all: [OI_EXPANSION_STRESS]
        required_subtype_any: [long_crowding_stress, short_squeeze_risk, squeeze_risk]
        confirm_any: [[FAILED_CONTINUATION, WICK_REVERSAL_PROXY, LIQUIDITY_VACUUM_RECOVERY]]
  full_forced_flow_v1:
    description: Full profile including liquidation feed.
    available_feeds: {ohlcv: true, funding: true, open_interest: true, spread_bps: true, depth_usd: true, liquidations: true}
    disabled_detectors: []
    context_only_detectors: []
    never_trade_standalone: []
    trade_candidate_events: []
    paper_approved_events: []
    live_approved_events: []
    research_only_events: []
    killed_events: []
    rejected_events: []
    research_candidate_variants: {}
    requires_pairing: {}
