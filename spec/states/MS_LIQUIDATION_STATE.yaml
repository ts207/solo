version: 1
kind: state_definition
state_id: MS_LIQUIDATION_STATE
family: POSITIONING_EXTREMES
source_event_type: LIQUIDATION_CASCADE
state_scope: family_safe
min_events: 300
description: Elevated liquidation pressure.
activation_rule: liquidation_pressure percentile >= 0.80
decay_rule: exit when liquidation_pressure percentile < 0.80
features_required:
- liquidation_notional
- rv_96
allowed_templates:
- convexity_capture
- mean_reversion
- continuation
- tail_risk_avoid
runtime:
  tags:
  - liquidity
  state_engine: MarketStateEngine
