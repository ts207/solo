version: 1
kind: state_definition
state_id: FUNDING_PERSISTENCE_STATE
family: POSITIONING_EXTREMES
source_event_type: FUNDING_PERSISTENCE_TRIGGER
activation_rule: funding_abs_pct >= persistence_pct for persistence_bars
decay_rule: exit when funding_abs_pct < normalization_pct
activation:
  condition: funding_abs_pct >= persistence_pct for persistence_bars
  min_hold_bars: 2
decay:
  condition: funding_abs_pct < normalization_pct OR funding_sign_flips
  max_duration_bars: 96
scope:
  state_scope: symbol_venue
  point_in_time_safe: true
context_dimensions:
  funding_phase:
    positive: positive_persistent
    negative: negative_persistent
features_required:
- funding_rate_scaled
- funding_abs_pct
allowed_templates:
- carry_unwind_reversal
- carry_continuation_confirmed
- basis_funding_convergence
- squeeze_followthrough_confirmed
- only_if_funding
- only_if_oi
- tail_risk_avoid
forbidden_templates:
- generic_continuation
- unconditioned_mean_reversion
