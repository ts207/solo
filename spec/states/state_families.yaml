version: 1
kind: state_family_registry
metadata:
  status: generated
  generated_notice: GENERATED FILE - DO NOT EDIT
  authored_sources:
  - spec/states/*.yaml
  read_model: true
defaults:
  state_scope: source_only
  min_events: 200
  runtime:
    enabled: true
    instrument_classes:
    - crypto
    tags: []
context_dimensions:
  basis_phase:
    allowed_values:
    - neutral
    - positive_dislocation
    - negative_dislocation
    - widening
    - converging
    - normalized
    mapping: {}
  carry_state:
    allowed_values:
    - funding_neg
    - funding_pos
    mapping:
      funding_neg: FUNDING_NEGATIVE
      funding_pos: FUNDING_POSITIVE
  data_quality_state:
    allowed_values:
    - ok
    - degraded
    - stale
    - missing_required_feature
    - synthetic_only
    mapping: {}
  execution_friction:
    allowed_values:
    - low
    - normal
    - elevated
    - severe
    - blocked
    mapping: {}
  forced_flow_phase:
    allowed_values:
    - none
    - pre_cascade
    - cascade
    - cooldown
    - refill
    - rebound_confirmed
    - reacceleration
    mapping:
      cascade: MS_LIQUIDATION_STATE
      cooldown: POST_CASCADE_RECOVERY_STATE
      refill: REFILL_LAG_STATE
  funding_phase:
    allowed_values:
    - neutral
    - positive_onset
    - negative_onset
    - positive_persistent
    - negative_persistent
    - positive_normalizing
    - negative_normalizing
    - flip_to_positive
    - flip_to_negative
    mapping:
      positive_persistent: MS_FUNDING_STATE
      negative_persistent: MS_FUNDING_STATE
      positive_normalizing: FUNDING_NORMALIZATION_STATE
      negative_normalizing: FUNDING_NORMALIZATION_STATE
  funding_regime:
    allowed_values:
    - crowded
    - normalizing
    mapping:
      crowded: CROWDING_STATE
      normalizing: FUNDING_NORMALIZATION_STATE
  liquidity_phase:
    allowed_values:
    - normal
    - thin
    - vacuum
    - collapse
    - refill
    - recovered
    mapping:
      thin: LOW_LIQUIDITY_STATE
      vacuum: LIQUIDITY_ABSENCE_STATE
      collapse: DEPTH_RECOVERY_STATE
      refill: REFILL_LAG_STATE
  liquidity_regime:
    allowed_values:
    - low
    - refill
    mapping:
      low: LOW_LIQUIDITY_STATE
      refill: REFILL_LAG_STATE
  ms_spread_state:
    allowed_values:
    - tight
    - wide
    mapping:
      tight: SPREAD_TIGHT
      wide: SPREAD_WIDE
  ms_trend_state:
    allowed_values:
    - trend
    - chop
    - bullish
    - bearish
    mapping:
      trend: TREND_ACTIVE
      chop: CHOP_ACTIVE
      bullish: BULL_TREND_REGIME
      bearish: BEAR_TREND_REGIME
  oi_phase:
    allowed_values:
    - neutral
    - expansion
    - contraction
    - flush
    - rebuild
    mapping:
      contraction: OI_CONTRACTION_STATE
      flush: OI_CONTRACTION_STATE
  price_oi_quadrant:
    allowed_values:
    - price_up_oi_up
    - price_up_oi_down
    - price_down_oi_up
    - price_down_oi_down
    mapping:
      price_down_oi_down: MS_LIQUIDATION_STATE
  temporal_phase:
    allowed_values:
    - normal
    - session_open
    - session_close
    - pre_funding_timestamp
    - post_funding_timestamp
    - pre_news
    - post_news
    mapping: {}
  trend_phase:
    allowed_values:
    - uptrend
    - downtrend
    - chop
    - compression
    - breakout
    - retest
    - exhaustion
    - transition
    mapping: {}
  trend_structure:
    allowed_values:
    - trend
    - chop
    mapping:
      trend: TRENDING_STATE
      chop: CHOP_STATE
  vol_phase:
    allowed_values:
    - compressed
    - normal
    - expanding
    - shock
    - aftershock
    - decaying
    mapping: {}
  vol_regime:
    allowed_values:
    - low
    - high
    mapping:
      low: LOW_VOL_REGIME
      high: HIGH_VOL_REGIME
state_families:
- name: basis_phase
  allowed_values:
  - neutral
  - positive_dislocation
  - negative_dislocation
  - widening
  - converging
  - normalized
  source_feature: basis_zscore
  canonical_metrics:
  - basis_zscore
  update_cadence: 5m
  acceptance_test_id: BASIS_PHASE_STABILITY_V1
- name: carry_state
  allowed_values:
  - funding_neg
  - funding_pos
  source_feature: funding_rate_bps
  canonical_metrics:
  - funding_rate_bps
  thresholds:
  - -0.1
  - 0.1
  update_cadence: 8h
