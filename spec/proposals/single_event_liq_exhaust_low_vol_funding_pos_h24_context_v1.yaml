    Liquidation exhaustion in low volatility is not improved by stricter event
    thresholds; the candidate edge should concentrate when the unwind occurs
    under positive funding/carry, where forced-flow cleanup can release crowded
    long-side pressure without broader volatility stress.
  research_question: >
    Does positive funding/carry isolate the low-vol h24 liquidation-exhaustion
    rebound strongly enough to clear bridge gates without changing thresholds?
  decision_rules:
