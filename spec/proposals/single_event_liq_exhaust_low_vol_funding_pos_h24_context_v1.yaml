    baseline_after_cost_expectancy_bps: 16.682463
    baseline_t_stat: 1.9368
    baseline_robustness_score: 0.4676
    minimal_success_test: >
      Survives as a bridge candidate with n >= 50, t_stat >= 2.0, robustness
      above the low-vol baseline, and no detector-threshold changes.
    invalidation_logic: >
      Reject the context-filter hypothesis if support falls below 50 events,
      min_t_stat remains the blocking gate, robustness deteriorates, or the run
      produces zero bridge candidates.
    likely_failure_mode: >
      Funding-positive context may retain most baseline events without removing
      the losing low-vol subset, leaving t-stat just below the bridge gate.
    phase2_gates_unchanged: true
