program_id: liquidation_std_gate_regime
description: >
  LIQUIDATION_CASCADE long exhaustion_reversal 24b, high-vol regime filter, H1-2024.
  One change from v4: adds feature predicate rv_pct_17280 > 0.70 (same condition
  as the only_if_regime filter template). Tests whether the 24b effect concentrates
  in high realized-vol periods, explaining the H1 vs H2 asymmetry.
run_mode: research
objective_name: retail_profitability
promotion_profile: research
symbols:
  - BTCUSDT
timeframe: 5m
start: "2024-01-01"
end: "2024-06-30"
instrument_classes:
  - crypto
search_spec:
  path: spec/productive_search.yaml
knobs:
  - name: discovery_profile
    value: synthetic
hypothesis:
  anchor:
    type: event
    event_id: LIQUIDATION_CASCADE
  filters:
    feature_predicates:
      - feature: rv_pct_17280
        operator: ">"
        threshold: 70
  sampling_policy:
    entry_lag_bars: 1
  template:
    id: exhaustion_reversal
  direction: long
  horizon_bars: 24
