program_id: single_event_liq_exhaustion_reversal_bounce_v1
description: >
  Pass 1 raw single-event test: when LIQUIDATION_EXHAUSTION_REVERSAL occurs,
  does BTCUSDT bounce over the next 12 bars after standard costs?
start: "2022-01-01"
end: "2024-12-31"
symbols:
  - BTCUSDT
timeframe: 5m
instrument_classes:
  - crypto
objective_name: retail_profitability
promotion_profile: disabled
search_spec:
  path: spec/search/single_event_liquidation_exhaustion_reversal_bounce_v1.yaml
avoid_region_keys: []
hypothesis:
  anchor:
    type: event
    event_id: LIQUIDATION_EXHAUSTION_REVERSAL
  filters: {}
  sampling_policy:
    mode: episodic
    entry_lag_bars: 1
    overlap_policy: suppress
  template:
    id: exhaustion_reversal
  direction: long
  horizon_bars: 12
artifacts:
  research_question: >
    When a downside liquidation exhaustion reversal event occurs, does BTCUSDT
    bounce over the next 12 bars after standard costs?
  single_event_scope:
    event_family: LIQUIDATION_EXHAUSTION_REVERSAL
    symbol: BTCUSDT
    timeframe: 5m
    direction: long
    horizons_bars: [3, 12, 24]
    confirmation: none_for_pass1
    validation_protocol: operator_preflight_plan_run_then_post_run_diagnosis
  acceptance_rules:
    min_events: 30
    min_net_expectancy_bps: 2
    min_sign_consistency: 0.60
    min_cost_survival_ratio: 0.80
    require_placebo_weaker: true
    require_regime_stability: true
