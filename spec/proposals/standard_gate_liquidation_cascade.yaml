program_id: standard_gate_liq_cascade
description: >
  Standard-gate LIQUIDATION_CASCADE discovery.
  No synthetic overlays. Uses discovery gate profile and full search space.
  LIQUIDATION_CASCADE is QUALITY:HIGH in search_space.yaml.
run_mode: research
objective_name: retail_profitability
promotion_profile: research
symbols:
  - BTCUSDT
timeframe: 5m
start: "2024-01-01"
end: "2024-06-30"
instrument_classes:
  - crypto
search_spec:
  path: spec/search_space.yaml
knobs:
  - name: discovery_profile
    value: standard
  - name: phase2_gate_profile
    value: discovery
hypothesis:
  anchor:
    type: event
    event_id: LIQUIDATION_CASCADE
  filters: {}
  sampling_policy:
    entry_lag_bars: 1
  template:
    id: mean_reversion
  direction: long
  horizon_bars: 12
