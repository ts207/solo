program_id: single_event_climax_volume_funding_neg_exhaustion_reversal_long_h24_btc_v1
description: >
  Bounded validation branch from the raw EAW calibration readout: when
  CLIMAX_VOLUME_BAR fires on BTCUSDT under negative carry, test whether the
  exhaustion_reversal long edge persists over the next 24 bars after standard
  costs.
start: "2022-01-01"
end: "2024-12-31"
symbols:
  - BTCUSDT
timeframe: 5m
instrument_classes:
  - crypto
objective_name: retail_profitability
promotion_profile: disabled
search_spec:
  path: spec/search/single_event_climax_volume_funding_neg_exhaustion_reversal_btc_h24_v1.yaml
avoid_region_keys: []
contexts:
  carry_state:
    - funding_neg
hypothesis:
  anchor:
    type: event
    event_id: CLIMAX_VOLUME_BAR
  filters:
    contexts:
      carry_state:
        - funding_neg
  sampling_policy:
    mode: episodic
    entry_lag_bars: 1
    overlap_policy: suppress
  template:
    id: exhaustion_reversal
  direction: long
  horizon_bars: 24
artifacts:
  matrix_phase: raw_eaw_climax_volume_funding_neg_validation
  matrix_run: CVB_FNEG_H24_BTC_V1
  parent_readout: docs/research/raw_eaw_calibration_2026-04-28.md
  prior_phase2_readout: docs/research/dataset_calibration_2026-04-28.md
  mechanism_statement: >
    Negative carry marks a positioning-stress pocket where a climax volume bar
    is more likely to represent trend-failure exhaustion than continuation.
  research_question: >
    Does the BTCUSDT CLIMAX_VOLUME_BAR exhaustion_reversal long edge under
    carry_state=funding_neg survive as a bounded 24-bar branch without adding
    symbols, horizons, contexts, or templates?
  calibration_evidence:
    old_spec_btc_funding_negative_n: 82
    old_spec_btc_funding_negative_mean_bps: 14.37
    old_spec_btc_funding_negative_t_stat: 0.72
    old_spec_btc_funding_negative_hit_rate: 0.488
    new_spec_btc_funding_negative_n: 287
    new_spec_btc_funding_negative_mean_bps: 14.50
    new_spec_btc_funding_negative_t_stat: 1.90
    new_spec_btc_funding_negative_hit_rate: 0.540
  decision_rules:
    min_events: 100
    kill_if_events_below: 50
    require_positive_post_cost_expectancy: true
    require_positive_year_folds: true
    require_validation_before_promotion: true
    no_eth_port_until_btc_validates: true
    no_extra_contexts_in_first_branch: true
    no_extra_horizons_in_first_branch: true
version: 1
