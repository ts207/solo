program_id: standard_gate_vol_shock
description: >
  Standard-gate VOL_SHOCK discovery over a 6-month window.
  No synthetic overlays. Uses discovery gate profile and full search space.
run_mode: research
objective_name: retail_profitability
promotion_profile: research
symbols:
  - BTCUSDT
timeframe: 5m
start: "2024-01-01"
end: "2024-06-30"
instrument_classes:
  - crypto
search_spec:
  path: spec/search_space.yaml
knobs:
  - name: discovery_profile
    value: standard
  - name: phase2_gate_profile
    value: discovery
hypothesis:
  anchor:
    type: event
    event_id: VOL_SHOCK
  filters: {}
  sampling_policy:
    entry_lag_bars: 1
  template:
    id: continuation
  direction: long
  horizon_bars: 12
