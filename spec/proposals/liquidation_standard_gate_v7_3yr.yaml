program_id: liquidation_std_gate_3yr
description: >
  LIQUIDATION_CASCADE long exhaustion_reversal 24b, rv_pct_17280 > 70,
  3-year window (2022-2024). One change from v6: window extended back one year.
  Tests whether t_stat continues to climb toward 2.0 with more events,
  or plateaus — determining whether 2023-2024 is the credible window.
run_mode: research
objective_name: retail_profitability
promotion_profile: research
symbols:
  - BTCUSDT
timeframe: 5m
start: "2022-01-01"
end: "2024-12-31"
instrument_classes:
  - crypto
search_spec:
  path: spec/productive_search.yaml
knobs:
  - name: discovery_profile
    value: synthetic
hypothesis:
  anchor:
    type: event
    event_id: LIQUIDATION_CASCADE
  filters:
    feature_predicates:
      - feature: rv_pct_17280
        operator: ">"
        threshold: 70
  sampling_policy:
    entry_lag_bars: 1
  template:
    id: exhaustion_reversal
  direction: long
  horizon_bars: 24
