    type: event
    event_id: FUNDING_PERSISTENCE_TRIGGER
  filters: {}
  sampling_policy:
    mode: episodic
    entry_lag_bars: 1
    overlap_policy: suppress
  template:
    id: continuation
  direction: long
  horizon_bars: 24
artifacts:
  research_question: >
    Does the FUNDING_PERSISTENCE_TRIGGER and FUNDING_EXTREME_ONSET long continuation
