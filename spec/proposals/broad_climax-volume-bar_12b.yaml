program_id: broad_climax_volume_bar_12b
description: >
  CLIMAX_VOLUME_BAR horizon sweep: 12b horizon. Same config as 48b broad run
  (exhaustion_reversal, rv_pct_17280 > 70, BTC 2023-2024). Tests whether shorter
  holding period captures more of the initial climax-bar impulse.
run_mode: research
objective_name: retail_profitability
promotion_profile: research
symbols:
  - BTCUSDT
timeframe: 5m
start: "2023-01-01"
end: "2024-12-31"
instrument_classes:
  - crypto
search_spec:
  path: spec/productive_search.yaml
knobs:
  - name: discovery_profile
    value: synthetic
hypothesis:
  anchor:
    type: event
    event_id: CLIMAX_VOLUME_BAR
  filters:
    feature_predicates:
      - feature: rv_pct_17280
        operator: ">"
        threshold: 70
  sampling_policy:
    entry_lag_bars: 1
  template:
    id: exhaustion_reversal
  direction: long
  horizon_bars: 12
