program_id: broad_climax_volume_bar_24b_2021
description: >
  CLIMAX_VOLUME_BAR 24b horizon, extended to 2021-2024 (4 years).
  Same config as 24b 2yr run but with more data for statistical power.
  24b is closest to clearing both gates: t=1.95, rob=0.79 on 2023-2024.
  Goal: test if additional years push t ≥ 2.0 while maintaining rob ≥ 0.70.
run_mode: research
objective_name: retail_profitability
promotion_profile: research
symbols:
  - BTCUSDT
timeframe: 5m
start: "2021-01-01"
end: "2024-12-31"
instrument_classes:
  - crypto
search_spec:
  path: spec/productive_search.yaml
knobs:
  - name: discovery_profile
    value: synthetic
hypothesis:
  anchor:
    type: event
    event_id: CLIMAX_VOLUME_BAR
  filters:
    feature_predicates:
      - feature: rv_pct_17280
        operator: ">"
        threshold: 70
  sampling_policy:
    entry_lag_bars: 1
  template:
    id: exhaustion_reversal
  direction: long
  horizon_bars: 24
