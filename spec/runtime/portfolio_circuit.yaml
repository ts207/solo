# Portfolio-level live circuit breaker.
# Action is fail-closed: halt new entries via global kill-switch; existing
# positions are managed by thesis decay and unwind handling.
enabled: true
lookback_samples: 288
min_samples: 2
max_portfolio_dd_pct: 0.05
target_vol_pct: 0.10
max_realized_vol_multiple: 2.0
realized_vol_window_samples: 48
concentration_cap_pct: 0.05
concentration_breach_multiplier: 1.5
