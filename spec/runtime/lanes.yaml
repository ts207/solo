schema_version: 1
tick_time_unit: us
lanes:
  - lane_id: alpha_5s
    cadence_us: 5000000
    watermark:
      policy: bounded_out_of_orderness
      max_lateness_us: 5000000
      idle_source_policy: stall
      idle_timeout_us: 0
    processing_time_gate:
      require_recv_time_leq_decision_time: true
    inputs:
      normalized_event_types: [book_l1, book_l2, trades, funding_schedule, venue_status, instrument_meta]
    state:
      produces: S_m
      consumes: [S_m]
      exec_state_visible: false
    policy:
      alpha_enabled: true
      execution_enabled: false
    outputs:
      emits: [X, S, E, A, Y]

  - lane_id: exec_1s
    cadence_us: 1000000
    watermark:
      policy: bounded_out_of_orderness
      max_lateness_us: 2000000
      idle_source_policy: allow_advance
      idle_timeout_us: 5000000
    processing_time_gate:
      require_recv_time_leq_decision_time: true
    inputs:
      normalized_event_types: [book_l1, trades, venue_status, oms_ack, oms_fill, oms_reject, account_margin, rate_limit]
    state:
      produces: S_x
      consumes: [S_x]
      exec_state_visible: true
    policy:
      alpha_enabled: false
      execution_enabled: true
    outputs:
      emits: [S, A, Y]
