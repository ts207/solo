schema_version: 1
roles:
  alpha:
    allowed_provenance: [market, calendar, quality]
    allow_exec_state: false
  events:
    allowed_provenance: [market, calendar, quality]
    allow_exec_state: false
  execution:
    allowed_provenance: [execution, market, quality]
    allow_exec_state: true
    allowed_market_state_fields: [mu, Sigma, z_map, anchor_coverage_by_dim]
constraints:
  forbid_posttrade_for_alpha: true
