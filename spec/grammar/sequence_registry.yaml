version: 1
kind: sequence_registry
sequences:
  - name: crowding_unwind
    events: [FUNDING_EXTREME_ONSET, OI_FLUSH, LIQUIDATION_CASCADE]
    max_gap: [6, 12]
    mode: ordered_strict
  - name: compression_breakout
    events: [RANGE_COMPRESSION_END, BREAKOUT_TRIGGER, FALSE_BREAKOUT]
    max_gap: [12, 6]
    mode: ordered_strict
  - name: liquidity_stress_repair
    events: [SPREAD_BLOWOUT, ABSORPTION_EVENT]
    max_gap: [6]
    mode: ordered_strict
  - name: vol_forced_unwind_cascade
    events: [VOL_SHOCK, FUNDING_EXTREME_ONSET, LIQUIDATION_CASCADE]
    max_gap: [6, 12]
    mode: ordered_strict
  - name: liquidity_cascade_chain
    events: [DEPTH_COLLAPSE, SPREAD_BLOWOUT, ORDERFLOW_IMBALANCE_SHOCK]
    max_gap: [6, 6]
    mode: ordered_strict
  - name: regime_recovery
    events: [TREND_EXHAUSTION_TRIGGER, CHOP_TO_TREND_SHIFT, TREND_ACCELERATION]
    max_gap: [12, 12]
    mode: ordered_strict
  - name: statistical_reversion_chain
    events: [ZSCORE_STRETCH, OVERSHOOT_AFTER_SHOCK, GAP_OVERSHOOT]
    max_gap: [6, 6]
    mode: ordered_strict
  - name: carry_unwind_cycle
    events: [FUNDING_PERSISTENCE_TRIGGER, DELEVERAGING_WAVE, POST_DELEVERAGING_REBOUND]
    max_gap: [24, 12]
    mode: ordered_strict
    allowed_templates:
      - carry_unwind_reversal
    invalidation:
      - liquidity_phase: blocked
      - trend_phase: strong_continuation_against_trade
  - name: forced_flow_rebound_setup
    events: [LIQUIDATION_CASCADE, OI_FLUSH, POST_DELEVERAGING_REBOUND]
    max_gap: [24, 12]
    mode: ordered_strict
    states_required:
      - DELEVERAGING_STATE
      - DEPTH_RECOVERY_STATE
    forbidden_states:
      - SPREAD_BLOWOUT
      - LIQUIDITY_ABSENCE_STATE
    allowed_templates:
      - forced_flow_rebound
      - cooldown_reversal
      - liquidity_refill_repair
  - name: confirmed_carry_continuation
    events: [FUNDING_PERSISTENCE_TRIGGER, OI_SPIKE_POSITIVE, TREND_ACCELERATION]
    max_gap: [24, 12]
    mode: ordered_strict
    states_required:
      - LOW_FRICTION_STATE
    allowed_templates:
      - carry_continuation_confirmed
