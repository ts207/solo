version: 1
kind: search_space
metadata:
  phase: edge_cells_v1
  description: Generated bounded search space for cell-first discovery.
  source_discovery_mode: edge_cells
triggers:
  events:
  - FUNDING_EXTREME_ONSET
  - FUNDING_PERSISTENCE_TRIGGER
  - VOL_SHOCK
horizons:
- 12b
- 24b
- 48b
directions:
- long
- short
entry_lag: 1
cost_profiles:
- standard
expression_templates:
- continuation
- mean_reversion
filter_templates: []
execution_templates: []
contexts:
  vol_regime:
  - high
  - low
  carry_state:
  - funding_pos
  - funding_neg
  ms_trend_state:
  - bullish
  - bearish
  - chop
  ms_spread_state:
  - wide
include_sequences: false
include_interactions: false
discovery_search:
  mode: flat
discovery_selection:
  mode: 'off'
