# Project-scoped Codex configuration
# See: https://developers.openai.com/codex/config-reference/

[project_docs]
# Keep AGENTS.md as the primary instruction entrypoint.
# Increase if your AGENTS.md chain is large; prefer moving detail into skills.
project_doc_max_bytes = 32768


[features]
# Enable only if you want multi-agent workflows.
multi_agent = true
